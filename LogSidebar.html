<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 12px;
      color: #202124;
      background: #fff;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .log-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid #e0e0e0;
      background: #f8f9fa;
      flex-shrink: 0;
    }

    .log-header-icon { font-size: 16px; line-height: 1; }

    .log-header-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: #6200ea;
    }

    /* ── Job selector ──────────────────────────────────────── */
    .job-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-bottom: 1px solid #e0e0e0;
      background: #f0f0f5;
      flex-shrink: 0;
    }

    .job-select {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #d0d0d8;
      border-radius: 6px;
      font-size: 11px;
      font-family: inherit;
      background: #fff;
      color: #333;
      cursor: pointer;
      min-width: 0;
    }
    .job-select:focus { outline: none; border-color: #6200ea; }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #ded9f5;
      border-top-color: #6200ea;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner.hidden { display: none; }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .log-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-bottom: 1px solid #eeeeee;
      background: #fafafa;
      flex-shrink: 0;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      background: #ede7f6;
      color: #4527a0;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: #d1c4e9; }
    .icon-btn.active { background: #6200ea; color: #fff; }

    .log-count {
      margin-left: auto;
      font-size: 10px;
      color: #9e9e9e;
    }

    /* ── Log panel ───────────────────────────────────────────── */
    .log-panel {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      background: #1e1e2e;
    }

    .log-entry {
      padding: 2px 12px;
      font-family: 'Roboto Mono', 'Courier New', monospace;
      font-size: 10.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 3px solid transparent;
    }

    .log-entry.INFO  { color: #a0d4a0; border-left-color: #2e7d32; }
    .log-entry.WARN  { color: #ffd580; border-left-color: #f57f17; }
    .log-entry.ERROR { color: #ff8080; border-left-color: #c62828; font-weight: 600; }

    .log-ts  { color: #555575; margin-right: 4px; }
    .log-level { margin-right: 5px; font-weight: 700; font-size: 9px; letter-spacing: 0.3px; opacity: 0.75; }

    .log-empty {
      padding: 24px 16px;
      text-align: center;
      color: #555575;
      font-size: 11px;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .log-footer {
      padding: 5px 12px;
      font-size: 10px;
      color: #78909c;
      border-top: 1px solid #eeeeee;
      background: #fafafa;
      flex-shrink: 0;
      min-height: 22px;
    }
    .log-footer.error   { color: #c62828; background: #ffebee; }
    .log-footer.success { color: #2e7d32; background: #e8f5e9; }
  </style>
</head>

<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <div class="log-header">
    <span class="log-header-icon">📋</span>
    <span class="log-header-title">EditorLLM Logs</span>
    <div class="spinner" id="spinner"></div>
    <button style="border:none; border-radius:4px; padding:3px 8px; font-size:10px; cursor:pointer; background:#ede7f6; color:#4527a0;" onclick="google.script.run.showSidebar()">⚡ Main</button>
  </div>

  <!-- ── Job selector (dropdown) ─────────────────────────────── -->
  <div class="job-selector">
    <select class="job-select" id="job-select" onchange="onJobSelectChange()">
      <option value="">— No jobs yet —</option>
    </select>
  </div>

  <!-- ── Toolbar (icon buttons) ──────────────────────────────── -->
  <div class="log-toolbar">
    <button class="icon-btn" onclick="refreshJobs()" title="Refresh jobs">🔄</button>
    <button class="icon-btn" onclick="clearPanel()" title="Clear log view">🧹</button>
    <button class="icon-btn" onclick="closeEmptyJobs()" title="Close empty jobs">🗑️</button>
    <button class="icon-btn" onclick="toggleAutoScroll()" id="autoscroll-btn" title="Toggle auto-scroll">⬇</button>
    <span class="log-count" id="log-count">0 entries</span>
  </div>

  <!-- ── Log panel ────────────────────────────────────────────── -->
  <div class="log-panel" id="log-panel">
    <div class="log-empty" id="log-empty">Select a job to view logs…</div>
  </div>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <div class="log-footer" id="log-footer">Connecting…</div>

  <script>
    // ── State ──────────────────────────────────────────────────

    var jobs         = [];      // JobMeta[] from server (newest first)
    var activeJobId  = null;    // currently viewed job
    var lastSeq      = 0;       // last seq for the active job
    var entryCount   = 0;
    var autoScroll   = true;
    var pollTimer    = null;    // log entry polling
    var listTimer    = null;    // job list polling
    var POLL_MS      = 1500;
    var LIST_MS      = 2500;

    // ── DOM helpers ────────────────────────────────────────────

    function panel()     { return document.getElementById('log-panel'); }
    function empty()     { return document.getElementById('log-empty'); }
    function footer()    { return document.getElementById('log-footer'); }
    function spinner()   { return document.getElementById('spinner'); }
    function countEl()   { return document.getElementById('log-count'); }
    function jobSelect() { return document.getElementById('job-select'); }

    function setFooter(msg, cls) {
      var el = footer();
      el.textContent = msg;
      el.className = 'log-footer' + (cls ? ' ' + cls : '');
    }

    // ── Log rendering ──────────────────────────────────────────

    function appendEntries(entries) {
      if (!entries || !entries.length) return;
      var p = panel();
      var emptyEl = empty();

      entries.forEach(function(entry) {
        if (emptyEl) emptyEl.style.display = 'none';

        var div = document.createElement('div');
        div.className = 'log-entry ' + (entry.level || 'INFO');

        var tsSpan  = document.createElement('span');
        tsSpan.className = 'log-ts';
        tsSpan.textContent = entry.ts || '';

        var lvlSpan = document.createElement('span');
        lvlSpan.className = 'log-level';
        lvlSpan.textContent = (entry.level || 'INFO').toUpperCase();

        div.appendChild(tsSpan);
        div.appendChild(lvlSpan);
        div.appendChild(document.createTextNode(entry.msg || ''));

        p.appendChild(div);
        entryCount++;

        if (entry.seq > lastSeq) lastSeq = entry.seq;
      });

      countEl().textContent = entryCount + (entryCount === 1 ? ' entry' : ' entries');
      if (autoScroll) p.scrollTop = p.scrollHeight;
    }

    function clearPanel() {
      var p = panel();
      while (p.lastChild && p.lastChild !== empty()) {
        p.removeChild(p.lastChild);
      }
      var emptyEl = empty();
      if (emptyEl) emptyEl.style.display = '';
      entryCount = 0;
      countEl().textContent = '0 entries';
    }

    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      var btn = document.getElementById('autoscroll-btn');
      btn.textContent = autoScroll ? '⬇' : '⏸';
      btn.title = autoScroll ? 'Auto-scroll ON — click to pause' : 'Auto-scroll OFF — click to resume';
      if (autoScroll) btn.classList.add('active');
      else btn.classList.remove('active');
    }

    // ── Job dropdown ──────────────────────────────────────────

    function statusIcon(jobId) {
      var meta = jobs.find(function(j) { return j.id === jobId; });
      if (!meta) return '⟳';
      if (meta._done && meta._error) return '✕';
      if (meta._done)                return '✓';
      return '⟳';
    }

    function renderJobDropdown() {
      var sel = jobSelect();
      sel.innerHTML = '';
      if (!jobs.length) {
        var opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '— No jobs yet —';
        sel.appendChild(opt);
        return;
      }
      jobs.forEach(function(job) {
        var opt = document.createElement('option');
        opt.value = job.id;
        opt.textContent = statusIcon(job.id) + ' ' + job.label + '  (' + job.startedAt + ')';
        if (job.id === activeJobId) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function onJobSelectChange() {
      var sel = jobSelect();
      var jobId = sel.value;
      if (jobId && jobId !== activeJobId) {
        selectJob(jobId);
      }
    }

    // ── Job selection ──────────────────────────────────────────

    function selectJob(jobId) {
      if (activeJobId === jobId) return;
      activeJobId = jobId;
      lastSeq = 0;
      entryCount = 0;
      clearPanel();
      renderJobDropdown();
      stopLogPolling();

      // Load all existing entries for this job
      setFooter('Loading logs…', '');
      spinner().classList.remove('hidden');
      google.script.run
        .withSuccessHandler(function(entries) {
          appendEntries(entries);
          // Now check status to decide whether to keep polling
          google.script.run
            .withSuccessHandler(function(status) {
              updateJobMeta(jobId, status);
              renderJobDropdown();
              if (status && status.done) {
                showJobDone(status);
              } else {
                setFooter('Live polling…', '');
                startLogPolling();
              }
            })
            .withFailureHandler(function() {
              setFooter('Polling…', '');
              startLogPolling();
            })
            .getJobStatus(jobId);
        })
        .withFailureHandler(function(e) {
          setFooter('Error loading logs: ' + (e.message || e), 'error');
        })
        .getLogsSince(jobId, 0);
    }

    function showJobDone(status) {
      spinner().classList.add('hidden');
      if (status.error) {
        setFooter('Error: ' + status.error, 'error');
      } else {
        setFooter('Completed successfully.', 'success');
      }
    }

    function updateJobMeta(jobId, status) {
      if (!status) return;
      var job = jobs.find(function(j) { return j.id === jobId; });
      if (job) {
        job._done  = status.done;
        job._error = status.error;
      }
    }

    // ── Close empty jobs ──────────────────────────────────────

    function closeEmptyJobs() {
      setFooter('Removing empty jobs…', '');
      google.script.run
        .withSuccessHandler(function(remainingJobs) {
          // Preserve _done/_error metadata
          var oldMap = {};
          jobs.forEach(function(j) { oldMap[j.id] = j; });
          remainingJobs.forEach(function(j) {
            if (oldMap[j.id]) {
              j._done  = oldMap[j.id]._done;
              j._error = oldMap[j.id]._error;
            }
          });
          jobs = remainingJobs;

          // If active job was removed, switch to newest or clear
          var activeStillExists = jobs.some(function(j) { return j.id === activeJobId; });
          if (!activeStillExists) {
            activeJobId = null;
            clearPanel();
            stopLogPolling();
            if (jobs.length) {
              selectJob(jobs[0].id);
            } else {
              setFooter('All jobs removed.', '');
            }
          }
          renderJobDropdown();
        })
        .withFailureHandler(function(e) {
          setFooter('Error: ' + (e.message || e), 'error');
        })
        .removeEmptyJobs();
    }

    // ── Polling ────────────────────────────────────────────────

    function stopLogPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      spinner().classList.add('hidden');
    }

    function startLogPolling() {
      stopLogPolling();
      spinner().classList.remove('hidden');
      pollTimer = setInterval(pollLogs, POLL_MS);
    }

    function pollLogs() {
      if (!activeJobId) return;
      var jid = activeJobId;
      var capturedSeq = lastSeq;
      google.script.run
        .withSuccessHandler(function(entries) {
          if (jid !== activeJobId) return; // user switched away
          if (entries && entries.length) appendEntries(entries);
        })
        .withFailureHandler(function() { /* ignore */ })
        .getLogsSince(jid, capturedSeq);

      // Also check if the job finished
      google.script.run
        .withSuccessHandler(function(status) {
          if (jid !== activeJobId) return;
          updateJobMeta(jid, status);
          renderJobDropdown();
          if (status && status.done) {
            // Final log fetch
            google.script.run
              .withSuccessHandler(function(finalEntries) {
                if (jid !== activeJobId) return;
                if (finalEntries && finalEntries.length) appendEntries(finalEntries);
                stopLogPolling();
                showJobDone(status);
              })
              .withFailureHandler(function() {
                stopLogPolling();
                showJobDone(status);
              })
              .getLogsSince(jid, lastSeq);
          }
        })
        .withFailureHandler(function() { /* ignore */ })
        .getJobStatus(jid);
    }

    // ── Job list polling ───────────────────────────────────────

    function pollJobList() {
      google.script.run
        .withSuccessHandler(function(serverJobs) {
          if (!serverJobs || !serverJobs.length) return;

          // Preserve _done/_error metadata we already have
          var oldMap = {};
          jobs.forEach(function(j) { oldMap[j.id] = j; });

          serverJobs.forEach(function(j) {
            if (oldMap[j.id]) {
              j._done  = oldMap[j.id]._done;
              j._error = oldMap[j.id]._error;
            }
          });

          var previousNewest = jobs.length ? jobs[0].id : null;
          jobs = serverJobs;
          renderJobDropdown();

          // Auto-select the newest job when:
          //  - no job is selected yet
          //  - a brand-new job appeared (newest id changed)
          var newestId = serverJobs[0] ? serverJobs[0].id : null;
          if (newestId && (!activeJobId || newestId !== previousNewest)) {
            selectJob(newestId);
          }
        })
        .withFailureHandler(function() { /* ignore */ })
        .getJobList();
    }

    // Also periodically refresh status for all jobs not yet done
    function refreshAllStatuses() {
      jobs.forEach(function(job) {
        if (job._done) return;
        google.script.run
          .withSuccessHandler(function(status) {
            updateJobMeta(job.id, status);
            renderJobDropdown();
          })
          .withFailureHandler(function() {})
          .getJobStatus(job.id);
      });
    }

    // ── Initialise ─────────────────────────────────────────────

    function init() {
      setFooter('Connecting…', '');
      // Set initial autoscroll state
      document.getElementById('autoscroll-btn').classList.add('active');
      pollJobList();
      listTimer = setInterval(function() {
        pollJobList();
        refreshAllStatuses();
      }, LIST_MS);
    }

    /** Manual refresh — re-fetches job list immediately. */
    function refreshJobs() {
      setFooter('Refreshing…', '');
      pollJobList();
      refreshAllStatuses();
    }

    init();
  </script>
</body>
</html>
