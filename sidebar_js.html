<script>
  // ── Helpers ────────────────────────────────────────────

  /**
   * Fetches all session log entries from the server and copies them to clipboard.
   * Uses execCommand fallback for the GAS sidebar iframe context.
   */
  function copyAllSessionLogs() {
    setStatus('Fetching session logs…', 'loading');
    google.script.run
      .withSuccessHandler(function(entries) {
        if (!entries || !entries.length) {
          setStatus('No session logs found.', 'loading');
          return;
        }
        var lines = entries.map(function(e) {
          return (e.ts || '') + '  ' + (e.level || 'INFO').padEnd(5) + '  ' + (e.msg || '');
        });
        var text = lines.join('\n');
        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy');
            setStatus('Copied ' + lines.length + ' log lines to clipboard.', 'info');
          } catch (_) {
            setStatus('Copy failed — use the log view (≡ Logs) to copy instead.', 'error');
          }
          document.body.removeChild(ta);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function() {
            setStatus('Copied ' + lines.length + ' log lines to clipboard.', 'info');
          }, fallback);
        } else {
          fallback();
        }
      })
      .withFailureHandler(function(e) {
        setStatus('Error fetching logs: ' + (e.message || e), 'error');
      })
      .getAllSessionLogs();
  }

  /** Max lines kept in Recent activity (sidebar). */
  var RECENT_RUNS_MAX = 25;
  var _toastHideTimer = null;

  function truncateOneLine(text, maxLen) {
    if (!text) return '';
    var parts = String(text).split(/\r?\n/);
    var one = '';
    for (var i = 0; i < parts.length; i++) {
      var s = parts[i].trim();
      if (s) { one = s; break; }
    }
    if (!one) one = String(text).trim();
    if (one.length <= maxLen) return one;
    return one.slice(0, maxLen - 1) + '…';
  }

  function escapeHtml(text) {
    return String(text == null ? '' : text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function timeHHMMSS() {
    var d = new Date();
    function z(n) { return n < 10 ? '0' + n : '' + n; }
    return z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
  }

  /**
   * Prepends a completed or failed run to Recent activity.
   * @param {string} sourceLabel Short tag: Status, Merge, Refresh, Sweep.
   */
  function appendRecentRun(sourceLabel, msg, ok) {
    var list = document.getElementById('recent-runs-list');
    if (!list) return;
    var line = String(msg || '').trim();
    if (!line) return;

    var li = document.createElement('li');
    li.className = 'recent-run-line ' + (ok ? 'recent-run-ok' : 'recent-run-fail');
    if (line.length > 100) li.title = line;

    var t = document.createElement('span');
    t.className = 'recent-run-time';
    t.textContent = timeHHMMSS();

    var mark = document.createElement('span');
    mark.className = 'recent-run-mark';
    mark.textContent = ok ? '✓ ' : '✗ ';

    var src = document.createElement('span');
    src.className = 'recent-run-src';
    src.textContent = '[' + (sourceLabel || 'Task') + '] ';

    var body = document.createElement('span');
    body.textContent = truncateOneLine(line, 220);

    li.appendChild(t);
    li.appendChild(mark);
    li.appendChild(src);
    li.appendChild(body);

    list.insertBefore(li, list.firstChild);
    while (list.children.length > RECENT_RUNS_MAX) {
      list.removeChild(list.lastChild);
    }
  }

  /** Brief toast for success / error so users see feedback without opening logs. */
  function showOutcomeToast(msg, type) {
    var host = document.getElementById('toast-host');
    if (!host) return;
    var line = truncateOneLine(msg, 160);
    if (!line) return;

    if (_toastHideTimer) {
      clearTimeout(_toastHideTimer);
      _toastHideTimer = null;
    }
    host.innerHTML = '';

    var t = document.createElement('div');
    t.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-success');
    t.textContent = line;
    host.appendChild(t);

    _toastHideTimer = setTimeout(function() {
      t.classList.add('toast-out');
      setTimeout(function() {
        if (t.parentNode === host) host.removeChild(t);
      }, 280);
      _toastHideTimer = null;
    }, 4800);
  }

  function notifyOutcomeIfTerminal(sourceLabel, msg, type) {
    if (type !== 'info' && type !== 'error') return;
    var line = String(msg || '').trim();
    if (!line) return;
    appendRecentRun(sourceLabel, line, type !== 'error');
    showOutcomeToast(line, type);
  }

  function setStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');
    notifyOutcomeIfTerminal('Status', msg, type);

  function setMergeStatus(msg, type) {

  function setRefreshStatus(msg, type) {

    notifyOutcomeIfTerminal('Refresh', msg, type);

  /** Wraps google.script.run in a Promise for sequential async calls. */
  function runServer(fnName) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      var call = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);
      call[fnName].apply(call, args);
    });
  }

  // ── StyleProfile quality score ─────────────────────────

  /**
   * Renders the LLM-as-judge StyleProfile score badge.
   * Colour: green ≥ 4, amber 3, red ≤ 2, grey when null (not yet run).
   */
  function renderStyleProfileScore(data) {
    var row    = document.getElementById('style-profile-score-row');
    var badge  = document.getElementById('style-profile-score-badge');
    var rationale = document.getElementById('style-profile-score-rationale');
    if (!row || !badge) return;
    if (data === null || data.score === null) {
      row.style.display = 'none';
      return;
    }
    var score = data.score;
    var color = score >= 4 ? '#81C784' : score >= 3 ? '#FFB74D' : '#EF9A9A';
    var bg    = score >= 4 ? '#1B3B2A' : score >= 3 ? '#3B2C15' : '#3B1B1B';
    badge.textContent = score + '/5';
    badge.style.color = color;
    badge.style.background = bg;
    if (rationale && data.rationale) {
      rationale.textContent = data.rationale;
    }
    row.style.display = 'block';
  }

  function loadStyleProfileScore() {
    google.script.run
      .withSuccessHandler(renderStyleProfileScore)
      .withFailureHandler(function () { /* silent */ })
      .getStyleProfileScore();
  }

  /** Row prefix matches Sidebar ids: `{prefix}-row`, `{prefix}-badge`, `{prefix}-rationale`. */
  function renderOneInstructionScoreRow(rowPrefix, data) {
    var row = document.getElementById(rowPrefix + '-row');
    var badge = document.getElementById(rowPrefix + '-badge');
    var rationale = document.getElementById(rowPrefix + '-rationale');
    if (!row || !badge) return;
    if (!data || data.score === null) {
      row.style.display = 'none';
      return;
    }
    var score = data.score;
    var color = score >= 4 ? '#81C784' : score >= 3 ? '#FFB74D' : '#EF9A9A';
    var bg = score >= 4 ? '#1B3B2A' : score >= 3 ? '#3B2C15' : '#3B1B1B';
    badge.textContent = score + '/5';
    badge.style.color = color;
    badge.style.background = bg;
    if (rationale) rationale.textContent = data.rationale || '';
    row.style.display = 'block';
  }

  function renderInstructionQualityRows(scores) {
    if (!scores) return;
    renderOneInstructionScoreRow('eartune-instr-score', scores.earTune);
    renderOneInstructionScoreRow('audit-instr-score', scores.audit);
    renderOneInstructionScoreRow('tether-instr-score', scores.tether);
    renderOneInstructionScoreRow('gp-instr-score', scores.generalPurpose);
    renderOneInstructionScoreRow('tts-instr-score', scores.tts);
  }

  function loadInstructionQualityScores() {
    google.script.run
      .withSuccessHandler(renderInstructionQualityRows)
      .withFailureHandler(function () { /* silent */ })
      .getInstructionQualityScores();
  }

  async function runArchitectInstructions() {
    _notifyJobStart_();

      await runServer('architectGenerateInstructions');
      setStatus('StyleProfile Scratch tab updated. Fetching quality score…', 'info');
      // Fetch and display the StyleProfile quality score (ArchitectAgent.evaluateInstructions).
      var scoreData = await runServer('getStyleProfileScore');
      renderStyleProfileScore(scoreData);
      var scoreMsg = (scoreData && scoreData.score !== null)
        ? ' Quality: ' + scoreData.score + '/5.' : '';
      setStatus('StyleProfile Scratch tab updated.' + scoreMsg, 'info');
      loadInstructionQualityScores();
    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
    }
  }

  // ── Merge & Refresh ────────────────────────────────────

  /**
   * Full Instruction Refresh — can be triggered standalone or chained after merge.
   *
   * Step 1 (serial):   Architect generates the StyleProfile.
   *                    All downstream agents read StyleProfile, so this must
   *                    complete before any of them run.
   *
   * Step 2 (parallel): Each google.script.run call launches its own GAS server
   *                    execution, giving genuine concurrent processing.
   *                    Promise.allSettled() is used so one failure does not
   *                    cancel the others — partial results are reported.
   */
  // Tracks whether the user has acknowledged a low-score warning for the current session.
  var _scoreGateAcknowledged = false;

  async function runFullInstructionRefresh() {
    _notifyJobStart_();
    var refreshBtn = document.getElementById('refreshInstructionsBtn');
    if (refreshBtn) refreshBtn.disabled = true;
    setRefreshStatus('', '');

    try {
      // ── §4.1 Score gate: warn if StyleProfile quality is too low ──
      if (!_scoreGateAcknowledged) {
        var existing = await runServer('getStyleProfileScore');
        if (existing && existing.score !== null && existing.score < 3) {
          setRefreshStatus(
            '⚠️ StyleProfile quality score is ' + existing.score + '/5 (< 3). ' +
            'Consider re-running Architect → Generate first. ' +
            'Click Refresh All again to proceed anyway.',
            'error'
          );
          _scoreGateAcknowledged = true;  // allow the next click through
          if (refreshBtn) refreshBtn.disabled = false;
          return;
        }
      }
      _scoreGateAcknowledged = false;  // reset for next use

      // Start a top-level job for the refresh suite so it appears in the Log Sidebar.
      // startJob must be awaited — we need the jobId before we can write traces.
      var suiteJobId = await runServer('startJob', 'Instruction Refresh Suite');

      // ── Helper: fire-and-forget trace ──────────────────────────────────────────
      // Trace writes do NOT need to block the calling flow — they're cache writes.
      // Using fire-and-forget eliminates one ~150 ms round-trip per trace call.
      function trace(level, msg) {
        google.script.run['trace' + (level === 'ERROR' ? 'Error' : 'Info')](msg, suiteJobId);
      }

      // ── Helper: batch trace (multiple entries, one round-trip) ─────────────────
      // Use when several traces fire between two real work steps with no blocking
      // needed between the individual entries.
      function traceBatch(entries) {
        google.script.run.batchTrace(entries.map(function(m) {
          return { level: m.level || 'INFO', msg: m.msg, jobId: suiteJobId };
        }));
      }

      trace('INFO', 'Starting Full Instruction Refresh flow…');

      // ── Step 1: StyleProfile (serial) ──────────────────
      setRefreshStatus('Generating StyleProfile (Architect)…', 'loading');
      trace('INFO', 'Step 1/2: Refreshing StyleProfile (Architect)…');
      try {
        await runServer('architectGenerateInstructions');
        var scoreData = await runServer('getStyleProfileScore');
        renderStyleProfileScore(scoreData);
        // Single trace — fire-and-forget, no await needed
        trace('INFO', 'StyleProfile refreshed. Score: ' + (scoreData.score != null ? scoreData.score : 'N/A'));
      } catch (e) {
        var msg = 'StyleProfile generation failed: ' + (e.message || e);
        trace('ERROR', msg);
        setRefreshStatus(msg + ' — downstream refresh aborted.', 'error');
        google.script.run.finishJob();
        return;
      }

      // ── Step 2: Downstream agents (serial) ─────────────
      // We run these serially to avoid "Service Documents failed" errors that
      // commonly occur in GAS when multiple concurrent threads hit the same doc.
      var agentSteps = [
        { name: 'Audit',   fn: 'auditorGenerateInstructions' },
        { name: 'Tether',  fn: 'tetherGenerateInstructions' },
      ];

      // Batch the step-start message with its per-agent count — one round-trip
      // instead of two separate awaited calls.
      trace('INFO', 'Step 2/2: Refreshing ' + agentSteps.length + ' downstream agents serially…');

      var failures = [];
      for (var i = 0; i < agentSteps.length; i++) {
        var step = agentSteps[i];
        var progress = '(' + (i + 1) + '/' + agentSteps.length + ')';
        setRefreshStatus('Refreshing ' + step.name + ' instructions ' + progress + '…', 'loading');
        // Fire-and-forget: no await — trace write never needs to block agent work
        trace('INFO', 'Refreshing ' + step.name + ' ' + progress + '…');
        try {
          await runServer(step.fn);
        } catch (e) {
          var stepErr = step.name + ': ' + (e.message || e);
          trace('ERROR', stepErr);
          failures.push(stepErr);
        }
      }

      if (failures.length === 0) {
        // Batch the final success trace + finishJob in one call each (fire-and-forget)
        trace('INFO', 'Full Instruction Refresh complete — success across all agents.');
        google.script.run.finishJob();
        setRefreshStatus('Full Instruction Refresh complete — all agents updated.', 'info');
      } else {
        traceBatch([
          { level: 'ERROR', msg: 'Refresh complete with ' + failures.length + ' failure(s): ' + failures.join('; ') }
        ]);
        google.script.run.finishJob();
        setRefreshStatus(
          'Refresh complete with ' + failures.length + ' failure(s): ' + failures.join('; '),
          'error'
        );
      }
    } catch (globalErr) {
      var globalMsg = 'Fatal crash in refresh flow: ' + (globalErr.message || globalErr);
      google.script.run.traceError(globalMsg, suiteJobId);
      google.script.run.finishJob();
      setRefreshStatus(globalMsg, 'error');
    } finally {
      if (refreshBtn) refreshBtn.disabled = false;
      google.script.run
        .withSuccessHandler(renderInstructionQualityRows)
        .withFailureHandler(function () { /* silent */ })
        .getInstructionQualityScores();
    }
  }

  // ── MultiSelectTabs instances ──────────────────────────────
  // Created lazily on first initMainTab() so the DOM is ready.
  var _mergeMultiselect   = null;
  var _managedMultiselect = null;

  /**
   * Initialise both multiselect widgets and load the document tab list
   * into them as the available option set.
   */
  function initMultiselects() {
    var mergeContainer   = document.getElementById('merge-multiselect');
    var managedContainer = document.getElementById('managed-multiselect');
    if (!mergeContainer || !managedContainer) return;

    if (!_mergeMultiselect) {
      _mergeMultiselect = MultiSelectTabs.create({
        container:   mergeContainer,
        placeholder: 'Add tab to merge…',
      });
    }
    if (!_managedMultiselect) {
      _managedMultiselect = MultiSelectTabs.create({
        container:   managedContainer,
        placeholder: 'Add managed tab…',
      });
    }

    // Populate option lists from live document tab names.
    google.script.run
      .withSuccessHandler(function(tabNames) {
        if (_mergeMultiselect)   _mergeMultiselect.setOptions(tabNames);
        if (_managedMultiselect) _managedMultiselect.setOptions(tabNames);
      })
      .getTabNames();
  }

  // ── Create Manuscript ───────────────────────────────────────

  function loadSavedMergeNames() {
    google.script.run
      .withSuccessHandler(function (names) {
        if (_mergeMultiselect) _mergeMultiselect.setValues(names);
        setMergeProgress(names.length ? 'Loaded ' + names.length + ' saved tab name(s).' : 'No saved names found.');
      })
      .withFailureHandler(function (e) { setMergeStatus('Error loading: ' + e.message, 'error'); })
      .getMergeTabNames();
  }

  function saveMergeNames(silent) {
    var names = _mergeMultiselect ? _mergeMultiselect.getValues() : [];
    var csv   = names.join(', ');
    google.script.run
      .withSuccessHandler(function () {
        if (!silent) setMergeProgress('Tab names saved.');
      })
      .withFailureHandler(function (e) { setMergeStatus('Error saving: ' + e.message, 'error'); })
      .saveMergeTabs(csv);
  }

  // ── Managed Tabs ────────────────────────────────────────────

  function setManagedTabsStatus(msg, type) {
    var el = document.getElementById('managed-tabs-status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');

  function loadSavedManagedTabNames() {
    google.script.run
      .withSuccessHandler(function(names) {
        if (_managedMultiselect) _managedMultiselect.setValues(names);
        setManagedTabsStatus(names.length ? 'Loaded ' + names.length + ' tab(s).' : 'No saved managed tabs found.', 'info');
      })
      .withFailureHandler(function(e) { setManagedTabsStatus('Error loading: ' + e.message, 'error'); })
      .getManagedTabNamesList();
  }

  function saveManagedTabNames() {
    var names = _managedMultiselect ? _managedMultiselect.getValues() : [];
    var csv   = names.join(', ');
    google.script.run
      .withSuccessHandler(function() { setManagedTabsStatus('Managed tabs saved.', 'info'); })
      .withFailureHandler(function(e) { setManagedTabsStatus('Error saving: ' + e.message, 'error'); })
      .saveManagedTabNamesList(csv);
  }

  async function runMergeNow() {
    _notifyJobStart_();
    var names = _mergeMultiselect ? _mergeMultiselect.getValues() : [];
    if (!names.length) {
      setMergeStatus('Enter at least one tab name to merge.', 'error');
      return;
    }

    // Auto-save the names before merging (silently to avoid masking merge progress).
    saveMergeNames(true);

    var btn = document.getElementById('mergeNowBtn');
    var refreshBtn = document.getElementById('refreshInstructionsBtn');
    btn.disabled = true;
    if (refreshBtn) refreshBtn.disabled = true;
    setMergeStatus('', '');
    setRefreshStatus('', '');
    setMergeProgress('Creating manuscript from ' + names.length + ' tab(s)… Please wait.');

    try {
      var res = await runServer('runMergeAllTabs', names);
      if (res && res.ok) {
        setMergeProgress('');
        setMergeStatus('Created Manuscript from ' + res.successes + ' tab(s).', 'info');
        // Chain: refresh all agent instructions now that Manuscript is up to date.
        // runFullInstructionRefresh manages its own refreshBtn disable/enable.
        await runFullInstructionRefresh();
      } else {
        setMergeProgress('');
        var errMsg = 'Merge complete with errors.\nOK: ' + (res.successes || 0) +
          '  Failed: ' + (res.errors ? res.errors.length : 1) +
          '\n\n' + (res.errors ? res.errors.join('\n') : 'Unknown error');
        setMergeStatus(errMsg, 'error');
      }
    } catch (err) {
      setMergeProgress('');
      setMergeStatus('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      // refreshBtn is already re-enabled by runFullInstructionRefresh on success;
      // re-enable here covers the error/abort paths where the refresh never ran.
      if (refreshBtn) refreshBtn.disabled = false;
    }
  }

  /**
   * Opens the sweep overlay for the given agent.
   * Fetches all document tab names, pre-checks those in the saved merge list,
   * then renders a checkbox list for the user to confirm.
   */
  function openSweepOverlay(agentKey, agentLabel) {
    _sweepAgentKey = agentKey;
    document.getElementById('sweep-agent-badge').textContent = agentLabel + ' Annotation Sweep';
    document.getElementById('sweep-tab-list').innerHTML = '<span style="color:#A0A0A0;font-size:11px;">Loading tabs…</span>';
    setSweepStatus('', '');
    document.getElementById('sweep-confirm-btn').disabled = false;
    document.getElementById('sweep-overlay').style.display = 'flex';

    // Load all tab names AND saved merge names in parallel, then render.
    var allTabs = null;
    var mergeNames = null;

    function maybeRender() {
      if (allTabs === null || mergeNames === null) return;
      var mergeSet = new Set(mergeNames);
      var listEl = document.getElementById('sweep-tab-list');
      if (!allTabs.length) {
        listEl.innerHTML = '<span style="color:#A0A0A0;font-size:11px;">No tabs found.</span>';
        return;
      }
      listEl.innerHTML = '';
      allTabs.forEach(function (name) {
        var label = document.createElement('label');
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = name;
        cb.checked = mergeSet.has(name);
        cb.id = 'sweep-cb-' + name.replace(/\s+/g, '-');
        label.appendChild(cb);
        label.appendChild(document.createTextNode(name));
        listEl.appendChild(label);
      });
    }

    // Only show tabs that are eligible for agent operations (not in never-processed
    // subtrees; within the user allowlist when one is configured).
    google.script.run
      .withSuccessHandler(function (tabs) { allTabs = tabs || []; maybeRender(); })
      .withFailureHandler(function (e) {
        document.getElementById('sweep-tab-list').innerHTML =
          '<span style="color:#EF9A9A;font-size:11px;">Error loading tabs: ' + e.message + '</span>';
      })
      .getManageableTabNames();

    google.script.run
      .withSuccessHandler(function (names) { mergeNames = names || []; maybeRender(); })
      .withFailureHandler(function () { mergeNames = []; maybeRender(); })
      .getMergeTabNames();
  }

  function closeSweepOverlay() {
    document.getElementById('sweep-overlay').style.display = 'none';
  }

  /** Collects checked tabs and kicks off the annotation sweep via google.script.run. */
  async function confirmSweep() {
    _notifyJobStart_();
    var checkboxes = document.querySelectorAll('#sweep-tab-list input[type=checkbox]:checked');
    var selected = [];
    checkboxes.forEach(function (cb) { selected.push(cb.value); });

    if (!selected.length) {
      setSweepStatus('Select at least one tab.', 'error');
      return;
    }

    var btn = document.getElementById('sweep-confirm-btn');
    btn.disabled = true;
    setSweepStatus('Sweeping ' + selected.length + ' tab(s)… See log view for progress.', 'loading');

    try {
      var result = await runServer('annotateSelectedTabs', _sweepAgentKey, selected);
      if (result && result.ok) {
        setSweepStatus('Sweep complete — ' + selected.length + ' tab(s) annotated.', 'info');
      } else {
        var errs = (result && result.errors) ? result.errors.join('\n') : 'Unknown error';
        setSweepStatus('Sweep finished with errors:\n' + errs, 'error');
      }
    } catch (e) {
      setSweepStatus('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

    var publisherPanel = document.getElementById('publisher-panel');

      initLogPanel();
    } else if (tabId === 'tts') {
      ttsPanel.style.display = 'block';
      initTtsTab();
    } else if (tabId === 'publisher') {
      publisherPanel.style.display = 'block';
      initPublisherTab();

    ['main', 'tts', 'publisher', 'logs'].forEach(function(id) {
      var hidden = (id === tabId);
      ['sb-tab-', 'dw-tab-'].forEach(function(prefix) {
        var btn = document.getElementById(prefix + id);
        if (btn) btn.style.display = hidden ? 'none' : '';

  function renderPublisherWorkflowState() {
    var state = _publisherWorkflowState;
    var hosts = ['publisher-workflow-main', 'publisher-workflow-panel'];
    if (!state) {
      hosts.forEach(function(id) {
        var host = document.getElementById(id);
        if (host) host.innerHTML = '<div class="publisher-workflow-empty">Publisher workflow state has not been loaded yet.</div>';
      });
      return;
    }

    var steps = [
      {
        title: 'Generate Instructions',
        status: state.instructions && state.instructions.done ? 'done' : 'pending',
        detail: state.instructions && state.instructions.done
          ? 'Publisher Instructions tab is present.'
          : (state.instructions && state.instructions.missingReason) || 'Publisher Instructions is missing.',
        pills: []
      },
      {
        title: 'Generate All Tabs',
        status: state.tabs && state.tabs.done ? 'done' : ((state.tabs && state.tabs.present && state.tabs.present.length) ? 'partial' : 'pending'),
        detail: state.tabs && state.tabs.done
          ? 'All required publisher tabs are present.'
          : 'Missing publisher tabs prevent full packaging coverage.',
        pills: (state.tabs && state.tabs.missing || []).map(function(name) {
          return { label: name, kind: 'missing' };
        }).concat((state.tabs && state.tabs.present || []).slice(0, 3).map(function(name) {
          return { label: name, kind: 'present' };
        }))
      },
      {
        title: 'Generate TOC',
        status: state.toc && state.toc.done ? 'done' : 'pending',
        detail: (state.toc && state.toc.detail) || 'Table of Contents has not been generated yet.',
        pills: []
      },
      {
        title: 'Structural Audit',
        status: state.structuralAudit && state.structuralAudit.done ? 'done' : 'pending',
        detail: (state.structuralAudit && state.structuralAudit.detail) || 'No structural audit detected.',
        pills: []
      },
      {
        title: 'Publish To ACX / EPUB',
        status: (state.publish && state.publish.status) || 'pending',
        detail: (state.publish && state.publish.detail) || 'Packaging prerequisites are incomplete.',
        pills: [
          { label: 'EPUB ' + ((state.publish && state.publish.epubReady) ? 'ready' : 'not ready'), kind: (state.publish && state.publish.epubReady) ? 'present' : 'missing' },
          { label: 'ACX ' + ((state.publish && state.publish.acxReady) ? 'ready' : 'needs audio'), kind: (state.publish && state.publish.acxReady) ? 'present' : 'missing' }
        ]
      }
    ];

    var html = steps.map(function(step) {
      var pills = (step.pills || []).length
        ? '<div class="publisher-workflow-pills">' + step.pills.map(function(pill) {
            return '<span class="publisher-workflow-pill publisher-workflow-pill--' + escapeHtml(pill.kind) + '">' + escapeHtml(pill.label) + '</span>';
          }).join('') + '</div>'
        : '';
      return '' +
        '<div class="publisher-workflow-step publisher-workflow-step--' + escapeHtml(step.status) + '">' +
          '<div class="publisher-workflow-marker"></div>' +
          '<div>' +
            '<div class="publisher-workflow-title">' + escapeHtml(step.title) + '</div>' +
            '<div class="publisher-workflow-detail">' + escapeHtml(step.detail) + '</div>' +
            pills +
          '</div>' +
        '</div>';
    }).join('');

    hosts.forEach(function(id) {
      var host = document.getElementById(id);
      if (host) host.innerHTML = html;
    });
  }

  function confirmPublisherGenerateAll() {
    closePublisherConfirm();
    _notifyJobStart_();
    setPublisherStatus('Generating all publishing tabs…', 'loading');
    google.script.run
      .withSuccessHandler(function(result) {
        var parts = [];
        if ((result.writtenTabs || []).length) parts.push('Written: ' + result.writtenTabs.join(', '));
        if ((result.missingTabs || []).length) parts.push('Missing from Gemini response: ' + result.missingTabs.join(', '));
        if ((result.unexpectedTabs || []).length) parts.push('Unexpected tabs ignored: ' + result.unexpectedTabs.join(', '));
        setPublisherStatus(parts.join(' | ') || 'No tabs were generated.', (result.missingTabs || []).length ? 'error' : 'info');
        refreshPublisherWorkflowState(true);
      })
      .withFailureHandler(function(e) {
        setPublisherStatus('Error: ' + e.message, 'error');
      })
      .publisherGenerateAllTabs();
  }

  function runPublisherGenerateMissing() {
    _notifyJobStart_();
    setPublisherStatus('Generating missing publishing tabs…', 'loading');
    google.script.run
      .withSuccessHandler(function(result) {
        if (!(result.requestedTabs || []).length) {
          setPublisherStatus('No missing publisher tabs were found.', 'info');
          refreshPublisherWorkflowState(true);
          return;
        }
        var parts = [];
        if ((result.writtenTabs || []).length) parts.push('Written: ' + result.writtenTabs.join(', '));
        if ((result.missingTabs || []).length) parts.push('Missing from Gemini response: ' + result.missingTabs.join(', '));
        if ((result.unexpectedTabs || []).length) parts.push('Unexpected tabs ignored: ' + result.unexpectedTabs.join(', '));
        setPublisherStatus(parts.join(' | '), (result.missingTabs || []).length ? 'error' : 'info');
        refreshPublisherWorkflowState(true);
      })
      .withFailureHandler(function(e) {
        setPublisherStatus('Error: ' + e.message, 'error');
      })
      .publisherGenerateMissingTabs();
  }

        if (!silent) {

  function renderPublisherAudioFiles() {
    var host = document.getElementById('publisher-audio-list');
    if (!host) return;
    host.innerHTML = '';
    if (!_publisherAudioFiles.length) {
      host.innerHTML = '<div class="agent-desc" style="margin:0;">No `.mp3` files found.</div>';

    _publisherAudioFiles.forEach(function(file, idx) {
      var row = document.createElement('div');
      row.style.display = 'flex';
      row.style.alignItems = 'center';
      row.style.gap = '8px';
      row.style.padding = '6px 4px';
      row.style.cursor = 'pointer';
      row.style.borderBottom = idx === _publisherAudioFiles.length - 1 ? 'none' : '1px solid var(--border)';
      row.style.background = idx === _publisherSelectedIndex ? 'rgba(138,180,248,0.12)' : 'transparent';
      row.onclick = function() {
        _publisherSelectedIndex = idx;
        renderPublisherAudioFiles();
      };

      var num = document.createElement('div');
      num.textContent = String(idx + 1);
      num.style.width = '20px';
      num.style.textAlign = 'right';
      num.style.color = 'var(--text-secondary)';

      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = file.selected !== false;
      checkbox.onclick = function(ev) { ev.stopPropagation(); };
      checkbox.onchange = function() {
        file.selected = checkbox.checked;
      };

      var name = document.createElement('div');
      name.textContent = file.name;
      name.style.flex = '1';
      name.style.minWidth = '0';
      name.style.fontSize = '12px';

      row.appendChild(num);
      row.appendChild(checkbox);
      row.appendChild(name);
      host.appendChild(row);

  function movePublisherAudioSelection(dir) {

    if (target < 0 || target >= _publisherAudioFiles.length) return;
    var tmp = _publisherAudioFiles[idx];
    _publisherAudioFiles[idx] = _publisherAudioFiles[target];
    _publisherAudioFiles[target] = tmp;
    _publisherSelectedIndex = target;
    renderPublisherAudioFiles();

  // ── Log Panel Init ─────────────────────────────────────
  // Called lazily when the user first opens the log view (sidebar or dialog).

  function initLogPanel() {
    if (_logInitialized) return;
    _logInitialized = true;
    setLogFooter('Connecting…', '');
    document.getElementById('autoscroll-btn').classList.add('active');
    pollJobDashboard();
    listTimer = setInterval(pollJobDashboard, JOB_DASHBOARD_MS);
  }

  // ── Log Panel State ────────────────────────────────────

  var jobs             = [];
  var activeJobId      = null;
  var lastSeq          = 0;
  var entryCount       = 0;
  var autoScroll       = true;
  var pollTimer        = null;
  var listTimer        = null;
  var LOG_POLL_MS      = 1500;
  var JOB_DASHBOARD_MS = 10000;

  // ── Log DOM Helpers ────────────────────────────────────

  function logPanel()   { return document.getElementById('log-panel'); }
  function logEmpty()   { return document.getElementById('log-empty'); }
  function logFooterEl(){ return document.getElementById('log-footer'); }
  function logSpinner() { return document.getElementById('spinner'); }
  function logCountEl() { return document.getElementById('log-count'); }
  function jobSelectEl(){ return document.getElementById('job-select'); }

  function setLogFooter(msg, cls) {
    var el = logFooterEl();
    el.textContent = msg;
    el.className = 'log-footer' + (cls ? ' ' + cls : '');
  }

  // ── Log Rendering ──────────────────────────────────────

  function appendEntries(entries) {
    if (!entries || !entries.length) return;
    var p       = logPanel();
    var emptyEl = logEmpty();

    entries.forEach(function(entry) {
      if (emptyEl) emptyEl.style.display = 'none';

      var div     = document.createElement('div');
      div.className = 'log-entry ' + (entry.level || 'INFO');

      var tsSpan  = document.createElement('span');
      tsSpan.className = 'log-ts';
      tsSpan.textContent = entry.ts || '';

      var lvlSpan = document.createElement('span');
      lvlSpan.className = 'log-level';
      lvlSpan.textContent = (entry.level || 'INFO').toUpperCase();

      div.appendChild(tsSpan);
      div.appendChild(lvlSpan);
      div.appendChild(document.createTextNode(entry.msg || ''));

      p.appendChild(div);
      entryCount++;

      if (entry.seq > lastSeq) lastSeq = entry.seq;
    });

    logCountEl().textContent = entryCount + (entryCount === 1 ? ' entry' : ' entries');
    if (autoScroll) p.scrollTop = p.scrollHeight;
  }

  function clearLogPanel() {
    var p = logPanel();
    while (p.lastChild && p.lastChild !== logEmpty()) {
      p.removeChild(p.lastChild);
    }
    var emptyEl = logEmpty();
    if (emptyEl) emptyEl.style.display = '';
    entryCount = 0;
    logCountEl().textContent = '0 entries';
  }

  function toggleAutoScroll() {
    autoScroll = !autoScroll;
    var btn = document.getElementById('autoscroll-btn');
    btn.textContent = autoScroll ? '↓' : '▶';
    btn.title = autoScroll
      ? 'Auto-scroll ON — click to pause'
      : 'Auto-scroll OFF — click to resume';
    if (autoScroll) btn.classList.add('active');
    else            btn.classList.remove('active');
  }

  // ── Job Dropdown ───────────────────────────────────────

  function statusIcon(jobId) {
    var meta = jobs.find(function(j) { return j.id === jobId; });
    if (!meta) return '⟳';
    if (meta._done && meta._error) return '✕';
    if (meta._done)                return '✓';
    return '⟳';
  }

  function renderJobDropdown() {
    var sel = jobSelectEl();
    sel.innerHTML = '';
    if (!jobs.length) {
      var opt = document.createElement('option');
      opt.value = '';
      opt.textContent = '— No jobs yet —';
      sel.appendChild(opt);
      return;
    }
    // Show all jobs (running and completed) so recently-finished jobs remain visible.
    jobs.forEach(function(job) {
      var opt = document.createElement('option');
      opt.value = job.id;
      opt.textContent = statusIcon(job.id) + ' ' + job.label + '  (' + job.startedAt + ')';
      if (job.id === activeJobId) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function onJobSelectChange() {
    var sel   = jobSelectEl();
    var jobId = sel.value;
    if (jobId && jobId !== activeJobId) selectJob(jobId);
  }

  // ── Job Selection ──────────────────────────────────────

  function selectJob(jobId) {
    if (activeJobId === jobId) return;
    activeJobId = jobId;
    lastSeq     = 0;
    entryCount  = 0;
    clearLogPanel();
    renderJobDropdown();
    stopLogPolling();

    setLogFooter('Loading logs…', '');
    logSpinner().classList.remove('hidden');
    google.script.run
      .withSuccessHandler(function(entries) {
        appendEntries(entries);
        google.script.run
          .withSuccessHandler(function(status) {
            updateJobMeta(jobId, status);
            renderJobDropdown();
            if (status && status.done) {
              showJobDone(status);
            } else {
              setLogFooter('Live polling…', '');
              startLogPolling();
            }
          })
          .withFailureHandler(function() {
            setLogFooter('Polling…', '');
            startLogPolling();
          })
          .getJobStatus(jobId);
      })
      .withFailureHandler(function(e) {
        setLogFooter('Error loading logs: ' + (e.message || e), 'error');
      })
      .getLogsSince(jobId, 0);
  }

  function showJobDone(status) {
    logSpinner().classList.add('hidden');
    if (status.error) {
      setLogFooter('Error: ' + status.error, 'error');
    } else {
      setLogFooter('Completed successfully.', 'success');
    }
  }

  function updateJobMeta(jobId, status) {
    if (!status) return;
    var job = jobs.find(function(j) { return j.id === jobId; });
    if (job) {
      job._done  = status.done;
      job._error = status.error;
    }
  }

  // ── Close Completed Jobs ───────────────────────────────

  function closeCompletedJobs() {
    setLogFooter('Removing completed jobs…', '');
    google.script.run
      .withSuccessHandler(function(remainingJobs) {
        var oldMap = {};
        jobs.forEach(function(j) { oldMap[j.id] = j; });
        remainingJobs.forEach(function(j) {
          if (oldMap[j.id]) {
            j._done  = oldMap[j.id]._done;
            j._error = oldMap[j.id]._error;
          }
        });
        jobs = remainingJobs;

        var activeStillExists = jobs.some(function(j) { return j.id === activeJobId; });
        if (!activeStillExists) {
          activeJobId = null;
          clearLogPanel();
          stopLogPolling();
          var runningJobs = jobs.filter(function(j) { return !j._done; });
          if (runningJobs.length) {
            selectJob(runningJobs[0].id);
          } else {
            setLogFooter('No running jobs.', '');
          }
        }
        renderJobDropdown();
        setLogFooter('Completed jobs removed.', 'success');
      })
      .withFailureHandler(function(e) {
        setLogFooter('Error: ' + (e.message || e), 'error');
      })
      .removeCompletedJobs();
  }

  // ── Log Polling ────────────────────────────────────────

  function stopLogPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    logSpinner().classList.add('hidden');
  }

  function startLogPolling() {
    stopLogPolling();
    logSpinner().classList.remove('hidden');
    pollTimer = setInterval(pollLogs, LOG_POLL_MS);
  }

  function pollLogs() {
    if (!activeJobId) return;
    var jid         = activeJobId;
    var capturedSeq = lastSeq;
    google.script.run
      .withSuccessHandler(function(entries) {
        if (jid !== activeJobId) return;
        if (entries && entries.length) appendEntries(entries);
      })
      .withFailureHandler(function() { /* ignore */ })
      .getLogsSince(jid, capturedSeq);
  }

  function pollJobDashboard() {
    google.script.run
      .withSuccessHandler(function(serverJobs) {
        if (!serverJobs || !serverJobs.length) {
          jobs = [];
          renderJobDropdown();
          return;
        }
        serverJobs.forEach(function(j) {
          j._done  = j.done;
          j._error = j.error;
        });

        var previousNewest = jobs.length ? jobs[0].id : null;
        jobs = serverJobs;
        renderJobDropdown();

        var newestId = serverJobs[0] ? serverJobs[0].id : null;
        if (newestId && (!activeJobId || newestId !== previousNewest)) {
          selectJob(newestId);
        }

        var current = jobs.find(function(j) { return j.id === activeJobId; });
        if (current) {
          if (current._done) {
            if (pollTimer) { stopLogPolling(); showJobDone(current); }
          } else {
            if (!pollTimer) startLogPolling();
          }
        }
      })
      .withFailureHandler(function() { /* ignore */ })
      .getJobDashboard();
  }

  function refreshJobs() {
    setLogFooter('Refreshing…', '');
    pollJobDashboard();
  }

  // ── Log Copy Helpers ───────────────────────────────────

  function formatLogsAsText(entries) {
    return entries.map(function(e) {
      return (e.ts || '') + '  ' + (e.level || 'INFO').padEnd(5) + '  ' + (e.msg || '');
    }).join('\n');
  }

  function copyToClipboard(text, label) {
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        setLogFooter((label || 'Logs') + ' copied (' + text.split('\n').length + ' lines).', 'success');
      } catch (_) {
        setLogFooter('Copy failed — select text manually.', 'error');
      }
      document.body.removeChild(ta);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        setLogFooter((label || 'Logs') + ' copied (' + text.split('\n').length + ' lines).', 'success');
      }, fallback);
    } else {
      fallback();
    }
  }

  function copyJobLogs() {
    var entries = logPanel().querySelectorAll('.log-entry');
    if (!entries.length) { setLogFooter('No log entries to copy.', ''); return; }
    var lines = [];
    entries.forEach(function(div) {
      var ts  = div.querySelector('.log-ts')    ? div.querySelector('.log-ts').textContent    : '';
      var lvl = div.querySelector('.log-level') ? div.querySelector('.log-level').textContent : '';
      var msg = '';
      div.childNodes.forEach(function(node) {
        if (node.nodeType === 3) msg += node.textContent;
      });
      lines.push(ts + '  ' + lvl.padEnd(5) + '  ' + msg.trim());
    });
    copyToClipboard(lines.join('\n'), 'Job logs');
  }

  function copyAllLogs() {
    setLogFooter('Fetching all session logs…', '');
    google.script.run
      .withSuccessHandler(function(entries) {
        if (!entries || !entries.length) { setLogFooter('No session logs found.', ''); return; }
        copyToClipboard(formatLogsAsText(entries), 'All session logs');
      })
      .withFailureHandler(function(e) {
        setLogFooter('Error fetching logs: ' + (e.message || e), 'error');
      })
      .getAllSessionLogs();
  }

  // ── Auto log-view (server-requested via showSidebar(true)) ─

  (function() {

  // ── TTS Tab Logic ──────────────────────────────────────

  var _ttsInitialized = false;
  var _ttsSavedPrefs = { voiceId: null, modelId: null };
  /** {voiceId: voiceName} map prefetched at startup; null = not yet loaded. */
  var _ttsVoiceMappings = null;
  /** Array of {voice_id, name} from ElevenLabs; null = not yet loaded. */
  var _ttsVoices = null;
  /** Array of {model_id, name} from ElevenLabs; null = not yet loaded. */
  var _ttsModels = null;

  var _currentEditDirective = null;
  /** True when the directive overlay is creating a new directive rather than editing an existing one. */
  var _isAddingDirective = false;
  /** Client-side cache of tab names for fast TTS-tab switching. */
  var _cachedTabNames = null;
  /** Client-side cache of the current active tab name. */

  function setSelectLoading_(id, label) {

  function applyCachedTabNames_(tabs) {
    _cachedTabNames = tabs || [];
    var sel = document.getElementById('tts-tab-select');
    if (!sel) return;
    sel.innerHTML = '';
    (_cachedTabNames || []).forEach(function(t) {

  function primeTabCache_() {

        .getTabNames();
