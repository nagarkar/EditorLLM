  // ── Pronunciation dictionary overlay ───────────────────

  /**
   * Returns the currently-selected dict from _ttsDicts, defaulting to first.
   * Returns null when _ttsDicts is empty or not loaded.
   */
  function _getSelectedDict() {
    if (!_ttsDicts || !_ttsDicts.length) return null;
    var sel = document.getElementById('tts-dictSelect');
    var selectedId = sel ? sel.value : '';
    if (selectedId) {
      for (var i = 0; i < _ttsDicts.length; i++) {
        if (_ttsDicts[i].id === selectedId) return _ttsDicts[i];
      }
    }
    return _ttsDicts[0];
  }

  function openPronOverlay() {
    var overlay = document.getElementById('pron-overlay');
    var body    = document.getElementById('pron-body');
    clearPronMeta_();
    body.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:20px 0;">Loading\u2026</div>';
    overlay.style.display = 'flex';

    // Use cached dicts if available; otherwise fetch from server.
    if (_ttsDicts) {
      renderPronTable(_ttsDicts);
    } else {
      google.script.run
        .withSuccessHandler(function(dicts) {
          _ttsDicts = dicts;
          renderPronTable(dicts);
        })
        .withFailureHandler(function(e) {
          body.innerHTML = '<div style="font-size:12px;color:var(--error-fg);text-align:center;padding:20px 0;">Could not load: ' + pronEsc(e.message || String(e)) + '</div>';
        })
        .elevenLabsGetPronunciationDictionaries();
    }
  }

  function closePronOverlay() {
    var overlay = document.getElementById('pron-overlay');
    if (overlay) overlay.style.display = 'none';
  }

  function refreshPronOverlay() {
    var body = document.getElementById('pron-body');
    var btn  = document.getElementById('pron-refresh-btn');
    clearPronMeta_();
    body.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:20px 0;">Refreshing\u2026</div>';
    if (btn) btn.disabled = true;

    google.script.run
      .withSuccessHandler(function(dicts) {
        if (btn) btn.disabled = false;
        _ttsDicts = dicts;
        // Repopulate the dropdown with fresh data, then render table.
        populateDictDropdown_(dicts);
        renderPronTable(dicts);
      })
      .withFailureHandler(function(e) {
        if (btn) btn.disabled = false;
        body.innerHTML = '<div style="font-size:12px;color:var(--error-fg);text-align:center;padding:20px 0;">Refresh failed: ' + pronEsc(e.message || String(e)) + '</div>';
      })
      .elevenLabsRefreshPronunciationDictionaries();
  }

  function onPronBackdropClick(e) {
    if (e.target === document.getElementById('pron-overlay')) closePronOverlay();
  }

  function clearPronMeta_() {
    var meta = document.getElementById('pron-dict-meta');
    if (meta) meta.style.display = 'none';
  }

  /**
   * Renders the selected dictionary's rules into the overlay body.
   * Shows dict name / id / version_id as a header, then a table with
   * three columns: Replace | With | Alphabet.
   */
  function renderPronTable(dicts) {
    var body = document.getElementById('pron-body');
    clearPronMeta_();

    if (!dicts || !dicts.length) {
      body.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:20px 0;">No pronunciation dictionaries cached.<br>Click \u21BA Refresh or set an API key first.</div>';
      return;
    }

    // Show only the selected (or default first) dict.
    var dict = _getSelectedDict();
    if (!dict) dict = dicts[0];

    // Populate the metadata header.
    var meta    = document.getElementById('pron-dict-meta');
    var nameEl  = document.getElementById('pron-dict-name');
    var idsEl   = document.getElementById('pron-dict-ids');
    if (meta && nameEl && idsEl) {
      nameEl.textContent = dict.name || '(unnamed)';
      idsEl.textContent  = 'id: ' + (dict.id || '\u2014') + '  \u2022  version: ' + (dict.version_id || '\u2014');
      meta.style.display = 'block';
    }

    var rules = dict.rules || [];
    if (!rules.length) {
      body.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);text-align:center;padding:20px 0;">Dictionary has no rules.</div>';
      return;
    }

    var html = '<table class="pron-table"><thead><tr><th>#</th><th>Replace</th><th>With</th><th>Alphabet</th></tr></thead><tbody>';
    rules.forEach(function(rule, idx) {
      html += '<tr>' +
        '<td class="col-num">' + (idx + 1) + '</td>' +
        '<td class="col-source">' + pronEsc(rule.string_to_replace || '\u2014') + '</td>' +
        '<td class="col-target">' + pronEsc(rule.replace_with     || '\u2014') + '</td>' +
        '<td style="font-size:11px;color:var(--text-secondary);text-align:center;">' + pronEsc(rule.alphabet || 'alias') + '</td>' +
      '</tr>';
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  }

  function pronEsc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Dictionary dropdown ─────────────────────────────────

  /**
   * Populates #tts-dictSelect from a dicts array and restores the saved selection.
   * savedId may be null (defaults to first entry).
   */
  function populateDictDropdown_(dicts, savedId) {
    var sel = document.getElementById('tts-dictSelect');
    if (!sel) return;
    sel.disabled = false;
    sel.innerHTML = '';
    if (!dicts || !dicts.length) {
      var empty = document.createElement('option');
      empty.value = '';
      empty.textContent = '(no dictionaries)';
      sel.appendChild(empty);
      return;
    }
    dicts.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.name || d.id;
      if (savedId && d.id === savedId) opt.selected = true;
      sel.appendChild(opt);
    });
    // If nothing matched, first entry is auto-selected — save it as the default.
    if (!savedId) {
      google.script.run.elevenLabsSaveSelectedDictionaryId(sel.value);
    }
  }

  /** Loads cached dicts from server and populates the dropdown. */
  function loadTtsDictionaries() {
    setSelectLoading_('tts-dictSelect', 'Loading dictionaries…');
    google.script.run
      .withSuccessHandler(function(dicts) {
        _ttsDicts = dicts || [];
        if (!_ttsDicts.length) {
          populateDictDropdown_([], null);
          return;
        }
        // Restore saved selection.
        google.script.run
          .withSuccessHandler(function(savedId) {
            populateDictDropdown_(_ttsDicts, savedId);
          })
          .withFailureHandler(function() {
            populateDictDropdown_(_ttsDicts, null);
          })
          .elevenLabsGetSelectedDictionaryId();
      })
      .withFailureHandler(function() {
        populateDictDropdown_([], null);
      })
      .elevenLabsGetPronunciationDictionaries();
  }

  /** Called onchange on #tts-dictSelect — saves the selected dict ID. */
  function saveTtsDictSelection() {
    var sel = document.getElementById('tts-dictSelect');
    if (!sel || !sel.value) return;
    google.script.run
      .withSuccessHandler(function() {
        var el = document.getElementById('tts-dict-status');
        if (el) { el.textContent = 'Dictionary saved.'; el.className = 'status-box info'; }
        setTimeout(function() { if (el) { el.textContent = ''; el.className = 'status-box'; } }, 2000);
      })
      .elevenLabsSaveSelectedDictionaryId(sel.value);
  }

  function initTtsTab() {
    if (_ttsInitialized) {
      var existingSel = document.getElementById('tts-tab-select');
      if (_cachedActiveTabName && existingSel) existingSel.value = _cachedActiveTabName;
      loadTtsDirectives();
      return;
    }
    _ttsInitialized = true;

    setTtsStatus('Initializing TTS tab…', 'loading');
    renderDirectiveListSkeleton_();
    setSelectLoading_('tts-voiceSelect', 'Loading voices…');
    setSelectLoading_('tts-modelSelect', 'Loading models…');
    setSelectLoading_('tts-dictSelect', 'Loading dictionaries…');

    if (_cachedTabNames && _cachedTabNames.length) {
      applyCachedTabNames_(_cachedTabNames);
      var sel = document.getElementById('tts-tab-select');
      if (_cachedActiveTabName && sel) sel.value = _cachedActiveTabName;
      loadTtsDirectives();
    } else {
      google.script.run
        .withSuccessHandler(function(tabs) {
          applyCachedTabNames_(tabs || []);
          var sel = document.getElementById('tts-tab-select');
          if (_cachedActiveTabName && sel) sel.value = _cachedActiveTabName;
          loadTtsDirectives();
        })
        .withFailureHandler(function(e) {
          setTtsStatus('Error loading tabs: ' + e.message, 'error');
        })
        .getTabNames();
    }

    google.script.run
      .withSuccessHandler(function(activeTab) {
        _cachedActiveTabName = activeTab || null;
        var sel = document.getElementById('tts-tab-select');
        if (activeTab && sel) {
          sel.value = activeTab;
          loadTtsDirectives();
        }
      })
      .getActiveTabName();

    // Init ElevenLabs audio controls in parallel.
    checkTtsApiKey();
    loadTtsLastGeneration();
  }

  function onTtsTabChange() {
    var tabName = document.getElementById('tts-tab-select').value;
    _cachedActiveTabName = tabName || null;
    google.script.run.setActiveTabByName(tabName);
    loadTtsDirectives();
  }

  function setTtsStatus(msg, type) {
    var el = document.getElementById('tts-status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');
  }

  function loadTtsDirectives() {
    var tabName = document.getElementById('tts-tab-select').value;
    if (!tabName) return;

    // Proceed even when _ttsVoiceMappings is null (no ElevenLabs API key set):
    // directives still load; voice names are omitted and only voice IDs are shown.
    setTtsStatus('Loading directives for ' + tabName + '…', 'loading');
    renderDirectiveListSkeleton_();
    google.script.run
      .withSuccessHandler(function(directives) {
        _currentTtsDirectives = directives || [];
        renderTtsDirectives(directives);
        setTtsStatus(directives.length + ' directive(s) found.', 'info');
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Error loading directives: ' + e.message, 'error');
      })
      .getTabDirectives(tabName);
  }

  /** Truncates a string to at most maxLen chars, appending '…' if trimmed. */
  function truncate_(s, maxLen) {
    if (!s) return '';
    return s.length <= maxLen ? s : s.slice(0, maxLen) + '…';
  }

  function voiceNameForId_(voiceId) {
    if (!voiceId) return '';
    if (_ttsVoices && _ttsVoices.length) {
      for (var i = 0; i < _ttsVoices.length; i++) {
        if (_ttsVoices[i].voice_id === voiceId) return _ttsVoices[i].name;
      }
    }
    if (_ttsVoiceMappings && _ttsVoiceMappings[voiceId]) return _ttsVoiceMappings[voiceId];
    return voiceId;
  }

  function firstWord_(s) {
    var trimmed = (s || '').trim();
    if (!trimmed) return '';
    return trimmed.split(/\s+/)[0];
  }

  function formatDirectiveNumber_(n) {
    var value = Number(n);
    if (!isFinite(value)) return '\u2014';
    return value.toFixed(2).replace(/\.?0+$/, '');
  }

  function isVoicePermissionError_(err) {
    var msg = err && err.message ? String(err.message) : String(err || '');
    return msg.indexOf('missing_permissions') >= 0 || msg.indexOf('voices_read') >= 0;
  }

  function populateVoiceSelect_(selectEl, selectedVoiceId) {
    if (!selectEl) return;
    selectEl.innerHTML = '';

    var voices = _ttsVoices && _ttsVoices.length
      ? _ttsVoices.map(function(v) { return { id: v.voice_id, name: v.name }; })
      : (_ttsVoiceMappings
        ? Object.keys(_ttsVoiceMappings).map(function(voiceId) {
            return { id: voiceId, name: _ttsVoiceMappings[voiceId] };
          })
        : []);

    if (!voices.length) {
      var empty = document.createElement('option');
      empty.value = '';
      empty.textContent = '(no voices)';
      selectEl.appendChild(empty);
      return;
    }

    var hasSelectedVoice = false;
    voices.forEach(function(v) {
      var opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = v.name;
      if (v.id === selectedVoiceId) {
        opt.selected = true;
        hasSelectedVoice = true;
      }
      selectEl.appendChild(opt);
    });

    if (selectedVoiceId && !hasSelectedVoice) {
      var fallback = document.createElement('option');
      fallback.value = selectedVoiceId;
      fallback.textContent = voiceNameForId_(selectedVoiceId);
      fallback.selected = true;
      selectEl.appendChild(fallback);
    }
  }

  function refreshVoiceDependentUi_() {
    var defaultVoiceSel = document.getElementById('tts-voiceSelect');
    if (defaultVoiceSel) {
      var selectedVoiceId = defaultVoiceSel.value || _ttsSavedPrefs.voiceId || '';
      populateVoiceSelect_(defaultVoiceSel, selectedVoiceId);
      setSelectReady_('tts-voiceSelect');
    }

    var editVoiceSel = document.getElementById('edit-voice-select');
    if (editVoiceSel && editVoiceSel.offsetParent !== null) {
      var editSelectedVoiceId = editVoiceSel.value
        || (_currentEditDirective && _currentEditDirective.voice_id)
        || _ttsSavedPrefs.voiceId
        || '';
      populateVoiceSelect_(editVoiceSel, editSelectedVoiceId || '');
    }

    if (_currentTtsDirectives && _currentTtsDirectives.length) {
      renderTtsDirectives(_currentTtsDirectives);
    }
  }

  /** Switches the audio controls between simple (no directives) and directive mode. */
  function updateTtsGenerationMode(hasDirectives) {
    var simple    = document.getElementById('tts-simple-controls');
    var directive = document.getElementById('tts-directive-controls');
    if (!simple || !directive) return;
    simple.style.display    = hasDirectives ? 'none'  : '';
    directive.style.display = hasDirectives ? 'block' : 'none';
  }

  /** Shows the audio player with the result from either generation path. */
  function showTtsAudioResult(result) {
    if (!result || !result.ok) {
      setTtsStatus('Error: ' + (result ? result.error : 'unknown'), 'error');
      return;
    }

    var player = document.getElementById('tts-audioPlayer');
    if (result.audioBase64) {
      var binary = atob(result.audioBase64);
      var bytes  = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      var blob = new Blob([bytes], { type: 'audio/mpeg' });
      player.src = URL.createObjectURL(blob);
      document.getElementById('tts-audio-player-container').style.display = 'block';
    }

    var linkWrap = document.getElementById('tts-driveLinkWrap');
    if (result.driveUrl) {
      var fileLabel = result.driveFileName
        ? '<span style="font-size:11px; color:var(--text-secondary); display:block; margin-bottom:4px;">EditorLLM/audio/' + result.driveFileName + '</span>'
        : '';
      linkWrap.innerHTML = fileLabel +
        '<a href="' + result.driveUrl + '" target="_blank" class="drive-link">Download from Drive</a>';
    }

    // Store file ID and show rename row when we have a Drive file.
    var renameRow = document.getElementById('tts-rename-row');
    if (result.driveFileId) {
      _ttsLastFileId = result.driveFileId;
      if (renameRow) renameRow.style.display = 'block';
    } else {
      _ttsLastFileId = null;
      if (renameRow) renameRow.style.display = 'none';
    }
  }

  function renderTtsDirectives(directives) {
    var list = document.getElementById('tts-directives-list');
    list.innerHTML = '';

    if (!directives.length) {
      list.innerHTML = '<div class="agent-desc" style="font-size:12px;">No directives on this tab.</div>';
      updateTtsGenerationMode(false);
      return;
    }

    updateTtsGenerationMode(true);

    var table = document.createElement('div');
    table.className = 'tts-directive-table';

    var header = document.createElement('div');
    header.className = 'tts-directive-row tts-directive-row--header';
    ['Text', 'Voice', 'Stab', 'Sim', '', '', ''].forEach(function(label, idx) {
      var head = document.createElement('div');
      head.className = 'tts-directive-cell tts-directive-cell--head' +
        ((idx === 2 || idx === 3) ? ' tts-directive-cell--num' : '');
      head.textContent = label;
      header.appendChild(head);
    });
    table.appendChild(header);

    directives.forEach(function(d) {
      var row = document.createElement('div');
      row.className = 'tts-directive-row tts-directive-row--data';
      row.onclick = function() { openDirectiveEdit(d); };

      // First two words of match text, max 24 chars
      var words = (d.matchText || '').split(/\s+/).slice(0, 2).join(' ');
      var matchDisplay = words.length > 24 ? words.slice(0, 24) + '\u2026' : words;
      var fullVoiceName = voiceNameForId_(d.voice_id);
      var shortVoiceName = firstWord_(fullVoiceName);

      var matchCol = document.createElement('div');
      matchCol.className = 'tts-directive-cell';
      matchCol.textContent = matchDisplay;
      row.title = (d.matchText || '') + (fullVoiceName ? '\nVoice: ' + fullVoiceName : '');
      matchCol.title = row.title;

      var voiceCol = document.createElement('div');
      voiceCol.className = 'tts-directive-cell';
      voiceCol.textContent = shortVoiceName || '\u2014';
      voiceCol.title = fullVoiceName || d.voice_id || '';

      var stabCol = document.createElement('div');
      stabCol.className = 'tts-directive-cell tts-directive-cell--num';
      stabCol.textContent = formatDirectiveNumber_(d.stability);

      var simCol = document.createElement('div');
      simCol.className = 'tts-directive-cell tts-directive-cell--num';
      simCol.textContent = formatDirectiveNumber_(d.similarity_boost);

      // Play (preview) button — ▶
      var playBtn = document.createElement('button');
      playBtn.type = 'button';
      playBtn.textContent = '\u25B6';
      playBtn.title = 'Preview first sentence';
      playBtn.style.cssText = 'flex-shrink:0; width:22px; height:22px; padding:0; border:none; border-radius:3px; background:#1A3461; color:#8AB4F8; cursor:pointer; font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center;';
      playBtn.onclick = function(e) {
        e.stopPropagation();
        previewDirective_(d);
      };

      // Jump button — ⌖
      var jumpBtn = document.createElement('button');
      jumpBtn.type = 'button';
      jumpBtn.textContent = '\u2316';
      jumpBtn.title = 'Jump to directive in document';
      jumpBtn.style.cssText = 'flex-shrink:0; width:22px; height:22px; padding:0; border:none; border-radius:3px; background:none; color:#8AB4F8; cursor:pointer; font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center;';
      jumpBtn.onclick = function(e) {
        e.stopPropagation();
        jumpToDirective_(d);
      };

      // Delete button — ✕
      var delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.textContent = '\u2715';
      delBtn.title = 'Delete directive';
      delBtn.style.cssText = 'flex-shrink:0; width:22px; height:22px; padding:0; border:none; border-radius:3px; background:none; color:#A0A0A0; cursor:pointer; font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center;';
      delBtn.onclick = function(e) {
        e.stopPropagation();
        deleteDirective(d);
      };

      row.appendChild(matchCol);
      row.appendChild(voiceCol);
      row.appendChild(stabCol);
      row.appendChild(simCol);
      row.appendChild(playBtn);
      row.appendChild(jumpBtn);
      row.appendChild(delBtn);
      table.appendChild(row);
    });

    list.appendChild(table);
  }

  /**
   * Generates a short audio preview for the directive — first sentence from
   * its location in the tab — and plays it in the dedicated preview player.
   * No Drive file is created.
   */
  function previewDirective_(d) {
    var tabName = document.getElementById('tts-tab-select').value;
    if (!tabName || !d || !d.name) return;

    setTtsStatus('Generating preview\u2026', 'loading');
    google.script.run
      .withSuccessHandler(function(result) {
        if (!result || !result.ok) {
          setTtsStatus('Preview error: ' + (result ? result.error : 'unknown'), 'error');
          return;
        }
        var container = document.getElementById('tts-preview-container');
        var player    = document.getElementById('tts-previewPlayer');
        if (result.audioBase64 && player) {
          var binary = atob(result.audioBase64);
          var bytes  = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          var blob = new Blob([bytes], { type: 'audio/mpeg' });
          player.src = URL.createObjectURL(blob);
          if (container) container.style.display = 'block';
          player.play();
        }
        setTtsStatus('Preview ready.', 'info');
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Preview failed: ' + e.message, 'error');
      })
      .elevenLabsPreviewDirective(tabName, d.name);
  }

  function jumpToDirective_(directive) {
    var tabName = document.getElementById('tts-tab-select').value;
    if (!tabName || !directive || !directive.name) return;
    setTtsStatus('Jumping to directive…', 'loading');
    google.script.run
      .withSuccessHandler(function(ok) {
        if (!ok) {
          setTtsStatus('Could not find that directive location.', 'error');
          return;
        }
        google.script.host.editor.focus();
        setTtsStatus('Directive location focused.', 'info');
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Error jumping to directive: ' + e.message, 'error');
      })
      .jumpToDirective(tabName, directive.name);
  }

  function openDirectiveEdit(d) {
    _currentEditDirective = d;
    _isAddingDirective = false;
    var overlay = document.getElementById('directive-edit-overlay');
    document.getElementById('directive-edit-title').textContent = 'Edit Directive';
    document.getElementById('directive-delete-btn').style.display = '';

    document.getElementById('edit-stability').value = d.stability != null ? d.stability : '';
    document.getElementById('edit-similarity-boost').value = d.similarity_boost != null ? d.similarity_boost : '';
    document.getElementById('edit-bookmark-id').value = d.bookmarkId || '';
    document.getElementById('edit-old-name').value = d.name || '';

    // Populate model dropdown from cached ElevenLabs models.
    var modelSel = document.getElementById('edit-tts-model');
    modelSel.innerHTML = '';
    if (_ttsModels && _ttsModels.length) {
      _ttsModels.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.model_id;
        opt.textContent = m.name;
        if (m.model_id === d.tts_model) opt.selected = true;
        modelSel.appendChild(opt);
      });
    } else {
      // Fallback: single option with current model id.
      var opt = document.createElement('option');
      opt.value = d.tts_model || '';
      opt.textContent = d.tts_model || '(unknown)';
      opt.selected = true;
      modelSel.appendChild(opt);
    }

    // Populate voice dropdown with human-readable names.
    populateVoiceSelect_(document.getElementById('edit-voice-select'), d.voice_id || '');

    overlay.style.display = 'flex';
  }

  function openAddDirectiveOverlay() {
    _currentEditDirective = null;
    _isAddingDirective = true;

    var overlay = document.getElementById('directive-edit-overlay');
    document.getElementById('directive-edit-title').textContent = 'Add Directive';
    document.getElementById('directive-delete-btn').style.display = 'none';
    document.getElementById('edit-bookmark-id').value = '';
    document.getElementById('edit-old-name').value = '';
    document.getElementById('edit-stability').value = '0.6';
    document.getElementById('edit-similarity-boost').value = '0.75';

    var modelSel = document.getElementById('edit-tts-model');
    modelSel.innerHTML = '';
    if (_ttsModels && _ttsModels.length) {
      _ttsModels.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.model_id;
        opt.textContent = m.name;
        if (m.model_id === (_ttsSavedPrefs.modelId || 'eleven_multilingual_v2')) opt.selected = true;
        modelSel.appendChild(opt);
      });
    } else if (document.getElementById('tts-modelSelect').value) {
      var mOpt = document.createElement('option');
      mOpt.value = document.getElementById('tts-modelSelect').value;
      mOpt.textContent = document.getElementById('tts-modelSelect').value;
      mOpt.selected = true;
      modelSel.appendChild(mOpt);
    }

    populateVoiceSelect_(
      document.getElementById('edit-voice-select'),
      _ttsSavedPrefs.voiceId || document.getElementById('tts-voiceSelect').value || ''
    );

    overlay.style.display = 'flex';
  }

  function closeDirectiveEdit() {
    document.getElementById('directive-edit-overlay').style.display = 'none';
    _currentEditDirective = null;
    _isAddingDirective = false;
  }

  function deleteDirectiveFromEdit() {
    if (!_currentEditDirective) return;
    closeDirectiveEdit();
    deleteDirective(_currentEditDirective);
  }

  function saveDirectiveEdit() {
    var modelId = document.getElementById('edit-tts-model').value;
    var voiceId = document.getElementById('edit-voice-select').value;
    var stability = parseFloat(document.getElementById('edit-stability').value);
    var similarityBoost = parseFloat(document.getElementById('edit-similarity-boost').value);
    var bookmarkId = document.getElementById('edit-bookmark-id').value;
    var oldName = document.getElementById('edit-old-name').value;
    var tabName = document.getElementById('tts-tab-select').value;

    var newPayload = {
      tts_model: modelId,
      voice_id: voiceId,
      stability: isNaN(stability) ? 0 : stability,
      similarity_boost: isNaN(similarityBoost) ? 0 : similarityBoost,
    };
    
    if (_isAddingDirective) {
      setTtsStatus('Adding directive from current cursor…', 'loading');
      google.script.run
        .withSuccessHandler(function() {
          setTtsStatus('Directive added.', 'info');
          closeDirectiveEdit();
          loadTtsDirectives();
        })
        .withFailureHandler(function(e) {
          setTtsStatus('Error adding directive: ' + e.message, 'error');
        })
        .addTtsDirectiveFromSelection(tabName, newPayload);
      return;
    }

    setTtsStatus('Updating directive…', 'loading');
    google.script.run
      .withSuccessHandler(function() {
        setTtsStatus('Directive updated.', 'info');
        closeDirectiveEdit();
        loadTtsDirectives();
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Error updating directive: ' + e.message, 'error');
      })
      .updateTtsDirective(tabName, bookmarkId, oldName, newPayload);
  }

  function deleteDirective(d) {
    if (!confirm('Are you sure you want to delete this directive?')) return;
    
    var tabName = document.getElementById('tts-tab-select').value;
    setTtsStatus('Deleting directive…', 'loading');
    google.script.run
      .withSuccessHandler(function() {
        setTtsStatus('Directive deleted.', 'info');
        loadTtsDirectives();
      })
      .withFailureHandler(function(e) {
        var msg = (e && e.message) ? e.message : (e || 'Unknown error');
        setTtsStatus('Error deleting directive: ' + msg, 'error');
      })
      .deleteTtsDirective(tabName, d.bookmarkId, d.name);
  }

  // ── ElevenLabs API Integration ──────────────────────────

  function checkTtsApiKey() {
    google.script.run
      .withSuccessHandler(function(keySet) {
        if (keySet) {
          document.getElementById('tts-apiKey').placeholder = '**** (set)';
          loadTtsPreferences_(function() {
            loadTtsVoiceMappings();
            loadTtsVoices();
            loadTtsModels();
            loadTtsDictionaries();
          });
        } else {
          setSelectLoading_('tts-voiceSelect', 'Set ElevenLabs key first');
          setSelectLoading_('tts-modelSelect', 'Set ElevenLabs key first');
          setSelectLoading_('tts-dictSelect', 'Set ElevenLabs key first');
        }
      })
      .elevenLabsHasApiKey();
  }

  function saveTtsApiKey() {
    var key = document.getElementById('tts-apiKey').value.trim();
    if (!key) { setTtsStatus('Enter API key.', 'error'); return; }
    var warning = 'You have set the API key. Anyone with access to this document will be able to use related features, but not see your key.\n\nDo you want to continue?';
    if (!confirm(warning)) return;

    setTtsStatus('Saving key…', 'loading');
    google.script.run
      .withSuccessHandler(function() {
        document.getElementById('tts-apiKey').value = '';
        document.getElementById('tts-apiKey').placeholder = '**** (set)';
        setTtsStatus('Key saved.', 'info');
        loadTtsPreferences_(function() {
          loadTtsVoiceMappings();
          loadTtsVoices();
          loadTtsModels();
          loadTtsDictionaries();
        });
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Error: ' + e.message, 'error');
      })
      .elevenLabsSaveApiKey(key);
  }

  function loadTtsPreferences_(callback) {
    google.script.run
      .withSuccessHandler(function(prefs) {
        if (prefs) _ttsSavedPrefs = prefs;
        if (callback) callback();
      })
      .elevenLabsGetPreferences();
  }

  function loadTtsVoiceMappings() {
    google.script.run
      .withSuccessHandler(function(mappings) {
        _ttsVoiceMappings = mappings || null;
        refreshVoiceDependentUi_();
      })
      .withFailureHandler(function() {
        // Non-fatal: directive list falls back to raw voice IDs.
      })
      .elevenLabsEnsureVoiceMappings();
  }

  function saveTtsVoicePreference() {
    var voiceId = document.getElementById('tts-voiceSelect').value;
    if (!voiceId) return;
    _ttsSavedPrefs.voiceId = voiceId;
    google.script.run.elevenLabsSaveVoicePreference(voiceId);
  }

  function saveTtsModelPreference() {
    var modelId = document.getElementById('tts-modelSelect').value;
    if (!modelId) return;
    _ttsSavedPrefs.modelId = modelId;
    google.script.run.elevenLabsSaveModelPreference(modelId);
  }

  function loadTtsVoices() {
    var useCase = ''; // Voice Type filter removed — see TODO in Sidebar.html
    setSelectLoading_('tts-voiceSelect', 'Loading voices…');
    google.script.run
      .withSuccessHandler(function(list) {
        _ttsVoices = list || [];
        if (_ttsVoices.length) {
          _ttsVoiceMappings = {};
          _ttsVoices.forEach(function(v) {
            _ttsVoiceMappings[v.voice_id] = v.name;
          });
        }
        refreshVoiceDependentUi_();
      })
      .withFailureHandler(function(e) {
        if (_ttsVoiceMappings && Object.keys(_ttsVoiceMappings).length) {
          _ttsVoices = null;
          refreshVoiceDependentUi_();
          setTtsStatus('Voice list unavailable; using cached voice names.', 'info');
          return;
        }
        var msg = (e && e.message) ? e.message : 'Could not load voices';
        var selectMsg = isVoicePermissionError_(e)
          ? 'Please give the Eleven Labs API sufficient permissions'
          : 'Could not load voices';
        setSelectLoading_('tts-voiceSelect', selectMsg);
        setTtsStatus(msg, 'error');
      })
      .elevenLabsListVoices(useCase);
  }

  function loadTtsModels() {
    setSelectLoading_('tts-modelSelect', 'Loading models…');
    google.script.run
      .withSuccessHandler(function(list) {
        _ttsModels = list; // cache for overlay model dropdown
        var sel = document.getElementById('tts-modelSelect');
        sel.disabled = false;
        sel.innerHTML = '';
        if (!(list || []).length) {
          var empty = document.createElement('option');
          empty.value = '';
          empty.textContent = '(no models)';
          sel.appendChild(empty);
        }
        (list || []).forEach(function(m) {
          var opt = document.createElement('option');
          opt.value = m.model_id;
          opt.textContent = m.name;
          if (m.model_id === (_ttsSavedPrefs.modelId || 'eleven_multilingual_v2')) opt.selected = true;
          sel.appendChild(opt);
        });
      })
      .withFailureHandler(function() {
        setSelectLoading_('tts-modelSelect', 'Could not load models');
      })
      .elevenLabsListModels();
  }

  function generateTtsAudio() {
    _notifyJobStart_();
    var voiceId = document.getElementById('tts-voiceSelect').value;
    var modelId = document.getElementById('tts-modelSelect').value;
    var tabName = document.getElementById('tts-tab-select').value;

    if (!voiceId) { setTtsStatus('Select a voice.', 'error'); return; }

    setTtsStatus('Reading tab text…', 'loading');
    google.script.run
      .withSuccessHandler(function(text) {
        if (!text) { setTtsStatus('Tab is empty.', 'error'); return; }

        setTtsStatus('Generating audio…', 'loading');
        google.script.run
          .withSuccessHandler(function(result) {
            showTtsAudioResult(result);
            if (result && result.ok) setTtsStatus('Audio generated.', 'info');
          })
          .withFailureHandler(function(e) {
            setTtsStatus('Error: ' + e.message, 'error');
          })
          .elevenLabsTextToSpeech(text, voiceId, modelId);
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Error reading tab: ' + e.message, 'error');
      })
      .getTabContent(tabName);
  }

  function generateTtsFromDirectives() {
    _notifyJobStart_();
    var tabName     = document.getElementById('tts-tab-select').value;
    var useStitching = document.getElementById('tts-useStitching').checked;

    setTtsStatus('Generating audio from directives' + (useStitching ? ' with stitching' : '') + '…', 'loading');
    google.script.run
      .withSuccessHandler(function(result) {
        showTtsAudioResult(result);
        if (result && result.ok) {
          var msg = 'Audio generated from ' + (result.segmentCount || '?') + ' directive segment(s).';
          setTtsStatus(msg, 'info');
        }
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Error: ' + e.message, 'error');
      })
      .elevenLabsTextToSpeechFromDirectives(tabName, useStitching);
  }

  function renameTtsAudioFile() {
    if (!_ttsLastFileId) { setTtsStatus('No file to rename.', 'error'); return; }
    var newName = (document.getElementById('tts-rename-input').value || '').trim();
    if (!newName) { setTtsStatus('Enter a new filename.', 'error'); return; }

    setTtsStatus('Renaming…', 'loading');
    google.script.run
      .withSuccessHandler(function(ok) {
        if (ok) {
          document.getElementById('tts-rename-input').value = '';
          setTtsStatus('File renamed to "' + newName + '.mp3".', 'info');
        } else {
          setTtsStatus('Rename failed.', 'error');
        }
      })
      .withFailureHandler(function(e) {
        setTtsStatus('Error renaming: ' + e.message, 'error');
      })
      .elevenLabsRenameAudioFile(_ttsLastFileId, newName);
  }

  function loadTtsLastGeneration() {
    google.script.run
      .withSuccessHandler(function(meta) {
        if (meta && meta.driveUrl) {
          // Could show last gen meta here if desired
        }
      })
      .elevenLabsGetLastGeneration();
  }

  // ── Dialog wrapper log routing ──────────────────────────
  // When a job-starting action is triggered from the dialog wrapper, we switch
  // the dialog to its own Logs tab so the user can see progress without the
  // server opening/switching the sidebar.  `_notifyJobStart_()` is called at
  // the start of every async job function; it is a no-op in sidebar mode.

  function _notifyJobStart_() {
    if (document.body.classList.contains('dialog-mode')) {
      switchTab('logs');
    }
  }

  // Tell the server the dialog is open so runTrackedJob_ skips showSidebar().
  // Done once at startup — the 10-minute TTL in UserCache covers a typical session.
  (function() {
    if (document.body.classList.contains('dialog-mode')) {
      google.script.run.setDialogOpen(true);
    }
  })();

</script>
