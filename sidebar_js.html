<script>
  // ── Helpers ────────────────────────────────────────────

  /**
   * Fetches all session log entries from the server and copies them to clipboard.
   * Uses execCommand fallback for the GAS sidebar iframe context.
   */
  function copyAllSessionLogs() {
    setStatus('Fetching session logs…', 'loading');
    google.script.run
      .withSuccessHandler(function(entries) {
        if (!entries || !entries.length) {
          setStatus('No session logs found.', 'loading');
          return;
        }
        var lines = entries.map(function(e) {
          return (e.ts || '') + '  ' + (e.level || 'INFO').padEnd(5) + '  ' + (e.msg || '');
        });
        var text = lines.join('\n');
        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand('copy');
            setStatus('Copied ' + lines.length + ' log lines to clipboard.', 'info');
          } catch (_) {
            setStatus('Copy failed — try the 📋 Logs sidebar instead.', 'error');
          }
          document.body.removeChild(ta);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function() {
            setStatus('Copied ' + lines.length + ' log lines to clipboard.', 'info');
          }, fallback);
        } else {
          fallback();
        }
      })
      .withFailureHandler(function(e) {
        setStatus('Error fetching logs: ' + (e.message || e), 'error');
      })
      .getAllSessionLogs();
  }

  function setStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');
  }

  function setMergeStatus(msg, type) {
    var el = document.getElementById('merge-status');
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');
  }

  function setMergeProgress(msg) {
    document.getElementById('merge-progress').textContent = msg;
  }

  function setRefreshStatus(msg, type) {
    var el = document.getElementById('refresh-status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');
  }

  /** Wraps google.script.run in a Promise for sequential async calls. */
  function runServer(fnName) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function (resolve, reject) {
      var call = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);
      call[fnName].apply(call, args);
    });
  }

  // ── Setup ──────────────────────────────────────────────

  function setupTabs() {
    setStatus('Initialising standard tabs…', 'loading');
    google.script.run
      .withSuccessHandler(function () {
        setStatus('Standard tabs created.', 'info');
      })
      .withFailureHandler(function (e) { setStatus('Error: ' + e.message, 'error'); })
      .setupStandardTabs();
  }

  function openApiKeyDialog() {
    google.script.run.showApiKeyConfig();
  }

  // ── StyleProfile quality score ─────────────────────────

  /**
   * Renders the LLM-as-judge StyleProfile score badge.
   * Colour: green ≥ 4, amber 3, red ≤ 2, grey when null (not yet run).
   */
  function renderStyleProfileScore(data) {
    var row    = document.getElementById('style-profile-score-row');
    var badge  = document.getElementById('style-profile-score-badge');
    var rationale = document.getElementById('style-profile-score-rationale');
    if (!row || !badge) return;
    if (data === null || data.score === null) {
      row.style.display = 'none';
      return;
    }
    var score = data.score;
    var color = score >= 4 ? '#2e7d32' : score >= 3 ? '#e65100' : '#c62828';
    var bg    = score >= 4 ? '#e8f5e9' : score >= 3 ? '#fff3e0' : '#ffebee';
    badge.textContent = score + '/5';
    badge.style.color = color;
    badge.style.background = bg;
    if (rationale && data.rationale) {
      rationale.textContent = data.rationale;
    }
    row.style.display = 'block';
  }

  function loadStyleProfileScore() {
    google.script.run
      .withSuccessHandler(renderStyleProfileScore)
      .withFailureHandler(function () { /* silent */ })
      .getStyleProfileScore();
  }

  // ── Architect ──────────────────────────────────────────


  async function runArchitectInstructions() {
    setStatus('Architect generating StyleProfile…', 'loading');
    try {
      await runServer('architectGenerateInstructions');
      setStatus('StyleProfile Scratch tab updated. Fetching quality score…', 'info');
      // Fetch and display the quality score written by evaluateStyleProfile_().
      var scoreData = await runServer('getStyleProfileScore');
      renderStyleProfileScore(scoreData);
      var scoreMsg = (scoreData && scoreData.score !== null)
        ? ' Quality: ' + scoreData.score + '/5.' : '';
      setStatus('StyleProfile Scratch tab updated.' + scoreMsg, 'info');
    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
    }
  }

  // ── EarTune ────────────────────────────────────────────


  function runEarTuneInstructions() {
    setStatus('EarTune generating instructions…', 'loading');
    google.script.run
      .withSuccessHandler(function () { setStatus('EarTune Scratch tab updated.', 'info'); })
      .withFailureHandler(function (e) { setStatus('Error: ' + e.message, 'error'); })
      .earTuneGenerateInstructions();
  }

  // ── Active tab display ─────────────────────────────────────

  async function runEarTune() {
    try {
      setStatus('Identifying active tab…', 'loading');
      var tabName = await runServer('getActiveTabName');
      var name = tabName || 'active tab';
      setStatus("Running Ear-Tune on Tab '" + name + "'…", 'loading');
      await runServer('earTuneAnnotateTab');
      setStatus("Ear-Tune annotations applied to Tab '" + name + "'.", 'info');
    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
    }
  }

  // ── Auditor ────────────────────────────────────────────


  function runAuditorInstructions() {
    setStatus('Auditor generating instructions…', 'loading');
    google.script.run
      .withSuccessHandler(function () { setStatus('TechnicalAudit Scratch tab updated.', 'info'); })
      .withFailureHandler(function (e) { setStatus('Error: ' + e.message, 'error'); })
      .auditorGenerateInstructions();
  }

  async function runAudit() {
    try {
      setStatus('Identifying active tab…', 'loading');
      var tabName = await runServer('getActiveTabName');
      var name = tabName || 'active tab';
      setStatus("Running Technical Audit on Tab '" + name + "'…", 'loading');
      await runServer('auditorAnnotateTab');
      setStatus("Audit annotations applied to Tab '" + name + "'.", 'info');
    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
    }
  }

  // ── Tether ─────────────────────────────────────────────


  function runTetherInstructions() {
    setStatus('Tether generating instructions…', 'loading');
    google.script.run
      .withSuccessHandler(function () { setStatus('TetherInstructions Scratch tab updated.', 'info'); })
      .withFailureHandler(function (e) { setStatus('Error: ' + e.message, 'error'); })
      .tetherGenerateInstructions();
  }

  async function runTether() {
    try {
      setStatus('Identifying active tab…', 'loading');
      var tabName = await runServer('getActiveTabName');
      var name = tabName || 'active tab';
      setStatus("Running Tether Check on Tab '" + name + "'…", 'loading');
      await runServer('tetherAnnotateTab');
      setStatus("Tether annotations applied to Tab '" + name + "'.", 'info');
    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
    }
  }

  // ── General Purpose Agent ─────────────────────────────

  function runProcessComments() {
    setStatus('Processing @AI comment threads…', 'loading');
    google.script.run
      .withSuccessHandler(function (result) {
        var msg = result.message ||
          ('Replied: ' + result.replied + ', Skipped: ' + result.skipped);
        setStatus(msg, result.replied > 0 ? 'info' : 'loading');
      })
      .withFailureHandler(function (e) { setStatus('Error: ' + e.message, 'error'); })
      .commentProcessorRun();
  }


  function runCommentInstructions() {
    setStatus('Generating Comment Instructions…', 'loading');
    google.script.run
      .withSuccessHandler(function () { setStatus('Comment Instructions Scratch tab updated.', 'info'); })
      .withFailureHandler(function (e) { setStatus('Error: ' + e.message, 'error'); })
      .generalPurposeAgentGenerateInstructions();
  }

  // ── Merge & Refresh ────────────────────────────────────

  /**
   * Full Instruction Refresh — can be triggered standalone or chained after merge.
   *
   * Step 1 (serial):   Architect generates the StyleProfile.
   *                    All downstream agents read StyleProfile, so this must
   *                    complete before any of them run.
   *
   * Step 2 (parallel): Each google.script.run call launches its own GAS server
   *                    execution, giving genuine concurrent processing.
   *                    Promise.allSettled() is used so one failure does not
   *                    cancel the others — partial results are reported.
   */
  // Tracks whether the user has acknowledged a low-score warning for the current session.
  var _scoreGateAcknowledged = false;

  async function runFullInstructionRefresh() {
    var refreshBtn = document.getElementById('refreshInstructionsBtn');
    if (refreshBtn) refreshBtn.disabled = true;
    setRefreshStatus('', '');

    try {
      // ── §4.1 Score gate: warn if StyleProfile quality is too low ──
      if (!_scoreGateAcknowledged) {
        var existing = await runServer('getStyleProfileScore');
        if (existing && existing.score !== null && existing.score < 3) {
          setRefreshStatus(
            '⚠️ StyleProfile quality score is ' + existing.score + '/5 (< 3). ' +
            'Consider re-running Architect → Generate first. ' +
            'Click Refresh All again to proceed anyway.',
            'error'
          );
          _scoreGateAcknowledged = true;  // allow the next click through
          if (refreshBtn) refreshBtn.disabled = false;
          return;
        }
      }
      _scoreGateAcknowledged = false;  // reset for next use

      // Start a top-level job for the refresh suite so it appears in the Log Sidebar.
      // startJob must be awaited — we need the jobId before we can write traces.
      var suiteJobId = await runServer('startJob', 'Instruction Refresh Suite');

      // ── Helper: fire-and-forget trace ──────────────────────────────────────────
      // Trace writes do NOT need to block the calling flow — they're cache writes.
      // Using fire-and-forget eliminates one ~150 ms round-trip per trace call.
      function trace(level, msg) {
        google.script.run['trace' + (level === 'ERROR' ? 'Error' : 'Info')](msg, suiteJobId);
      }

      // ── Helper: batch trace (multiple entries, one round-trip) ─────────────────
      // Use when several traces fire between two real work steps with no blocking
      // needed between the individual entries.
      function traceBatch(entries) {
        google.script.run.batchTrace(entries.map(function(m) {
          return { level: m.level || 'INFO', msg: m.msg, jobId: suiteJobId };
        }));
      }

      trace('INFO', 'Starting Full Instruction Refresh flow…');

      // ── Step 1: StyleProfile (serial) ──────────────────
      setRefreshStatus('Generating StyleProfile (Architect)…', 'loading');
      trace('INFO', 'Step 1/2: Refreshing StyleProfile (Architect)…');
      try {
        await runServer('architectGenerateInstructions');
        var scoreData = await runServer('getStyleProfileScore');
        renderStyleProfileScore(scoreData);
        // Single trace — fire-and-forget, no await needed
        trace('INFO', 'StyleProfile refreshed. Score: ' + (scoreData.score != null ? scoreData.score : 'N/A'));
      } catch (e) {
        var msg = 'StyleProfile generation failed: ' + (e.message || e);
        trace('ERROR', msg);
        setRefreshStatus(msg + ' — downstream refresh aborted.', 'error');
        google.script.run.finishJob();
        return;
      }

      // ── Step 2: Downstream agents (serial) ─────────────
      // We run these serially to avoid "Service Documents failed" errors that
      // commonly occur in GAS when multiple concurrent threads hit the same doc.
      var agentSteps = [
        { name: 'EarTune', fn: 'earTuneGenerateInstructions' },
        { name: 'Audit',   fn: 'auditorGenerateInstructions' },
        { name: 'Tether',  fn: 'tetherGenerateInstructions' },
        { name: 'General Purpose', fn: 'generalPurposeAgentGenerateInstructions' }
      ];

      // Batch the step-start message with its per-agent count — one round-trip
      // instead of two separate awaited calls.
      trace('INFO', 'Step 2/2: Refreshing ' + agentSteps.length + ' downstream agents serially…');

      var failures = [];
      for (var i = 0; i < agentSteps.length; i++) {
        var step = agentSteps[i];
        var progress = '(' + (i + 1) + '/' + agentSteps.length + ')';
        setRefreshStatus('Refreshing ' + step.name + ' instructions ' + progress + '…', 'loading');
        // Fire-and-forget: no await — trace write never needs to block agent work
        trace('INFO', 'Refreshing ' + step.name + ' ' + progress + '…');
        try {
          await runServer(step.fn);
        } catch (e) {
          var stepErr = step.name + ': ' + (e.message || e);
          trace('ERROR', stepErr);
          failures.push(stepErr);
        }
      }

      if (failures.length === 0) {
        // Batch the final success trace + finishJob in one call each (fire-and-forget)
        trace('INFO', 'Full Instruction Refresh complete — success across all agents.');
        google.script.run.finishJob();
        setRefreshStatus('Full Instruction Refresh complete — all agents updated.', 'info');
      } else {
        traceBatch([
          { level: 'ERROR', msg: 'Refresh complete with ' + failures.length + ' failure(s): ' + failures.join('; ') }
        ]);
        google.script.run.finishJob();
        setRefreshStatus(
          'Refresh complete with ' + failures.length + ' failure(s): ' + failures.join('; '),
          'error'
        );
      }
    } catch (globalErr) {
      var globalMsg = 'Fatal crash in refresh flow: ' + (globalErr.message || globalErr);
      google.script.run.traceError(globalMsg, suiteJobId);
      google.script.run.finishJob();
      setRefreshStatus(globalMsg, 'error');
    } finally {
      if (refreshBtn) refreshBtn.disabled = false;
    }
  }

  function loadSavedMergeNames() {
    google.script.run
      .withSuccessHandler(function (names) {
        document.getElementById('merge-tab-names').value = names.join(', ');
        setMergeProgress(names.length ? 'Loaded ' + names.length + ' saved tab name(s).' : 'No saved names found.');
      })
      .withFailureHandler(function (e) { setMergeStatus('Error loading: ' + e.message, 'error'); })
      .getMergeTabNames();
  }

  function saveMergeNames(silent) {
    var csv = document.getElementById('merge-tab-names').value;
    google.script.run
      .withSuccessHandler(function () {
        if (!silent) setMergeProgress('Tab names saved.');
      })
      .withFailureHandler(function (e) { setMergeStatus('Error saving: ' + e.message, 'error'); })
      .saveMergeTabs(csv);
  }

  async function runMergeNow() {
    var raw = document.getElementById('merge-tab-names').value || '';
    var names = raw.split(',').map(function (s) { return s.trim(); }).filter(Boolean);
    if (!names.length) {
      setMergeStatus('Enter at least one tab name to merge.', 'error');
      return;
    }

    // Auto-save the names before merging (silently to avoid masking merge progress).
    saveMergeNames(true);

    var btn = document.getElementById('mergeNowBtn');
    var refreshBtn = document.getElementById('refreshInstructionsBtn');
    btn.disabled = true;
    if (refreshBtn) refreshBtn.disabled = true;
    setMergeStatus('', '');
    setRefreshStatus('', '');
    setMergeProgress('Merging ' + names.length + ' tab(s)… Please wait.');

    try {
      var res = await runServer('runMergeAllTabs', names);
      if (res && res.ok) {
        setMergeProgress('');
        setMergeStatus('Merged ' + res.successes + ' tab(s) into MergedContent.', 'info');
        // Chain: refresh all agent instructions now that MergedContent is up to date.
        // runFullInstructionRefresh manages its own refreshBtn disable/enable.
        await runFullInstructionRefresh();
      } else {
        setMergeProgress('');
        var errMsg = 'Merge complete with errors.\nOK: ' + (res.successes || 0) +
          '  Failed: ' + (res.errors ? res.errors.length : 1) +
          '\n\n' + (res.errors ? res.errors.join('\n') : 'Unknown error');
        setMergeStatus(errMsg, 'error');
      }
    } catch (err) {
      setMergeProgress('');
      setMergeStatus('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      // refreshBtn is already re-enabled by runFullInstructionRefresh on success;
      // re-enable here covers the error/abort paths where the refresh never ran.
      if (refreshBtn) refreshBtn.disabled = false;
    }
  }

  loadModelConfig();
  loadHighlightColor();
  loadDebugMode();
  loadSavedMergeNames();
  loadStyleProfileScore();

  // ── Global Setting Functions ───────────────────────────

  function loadHighlightColor() {
    google.script.run
      .withSuccessHandler(function (color) {
        if (color) document.getElementById('highlight-color').value = color;
      })
      .getHighlightColor();
  }

  function saveHighlightColor() {
    var color = document.getElementById('highlight-color').value;
    setColorStatus('Saving…', 'loading');
    google.script.run
      .withSuccessHandler(function () { setColorStatus('Color saved.', 'info'); })
      .withFailureHandler(function (e) { setColorStatus('Error: ' + e.message, 'error'); })
      .saveHighlightColor(color);
  }

  function setColorStatus(msg, type) {
    var el = document.getElementById('color-status');
    if (el) {
      el.textContent = msg;
      el.className = 'status-box' + (type ? ' ' + type : '');
    }
  }

  // ── Reusable preference helpers ────────────────────────

  /**
   * Loads a boolean server preference and sets a checkbox element.
   * serverFn must return a boolean. Future boolean prefs need only
   * one call to loadPrefCheckbox + one saveXxx function.
   */
  function loadPrefCheckbox(elementId, serverFn) {
    google.script.run
      .withSuccessHandler(function(val) {
        var el = document.getElementById(elementId);
        if (el) el.checked = !!val;
      })
      .withFailureHandler(function() { /* silent — non-critical */ })
      [serverFn]();
  }

  // ── Debug Mode ─────────────────────────────────────────

  function loadDebugMode() {
    loadPrefCheckbox('debug-mode-toggle', 'getDebugMode');
  }

  function saveDebugMode(enabled) {
    var statusEl = document.getElementById('debug-mode-status');
    google.script.run
      .withSuccessHandler(function() {
        if (statusEl) { statusEl.textContent = 'Saved.'; setTimeout(function(){ statusEl.textContent = ''; }, 1500); }
      })
      .withFailureHandler(function(e) {
        if (statusEl) { statusEl.textContent = 'Error: ' + e.message; statusEl.className = 'status-box error'; }
      })
      .saveDebugMode(enabled);
  }

  // ── Model Configuration ────────────────────────────────

  function setModelStatus(msg, type) {
    var el = document.getElementById('model-status');
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');
  }

  function loadModelConfig() {
    google.script.run
      .withSuccessHandler(function (cfg) {
        document.getElementById('model-fast').innerHTML = '<option value="' + cfg.fast + '">' + cfg.fast + '</option>';
        document.getElementById('model-fast').value = cfg.fast;

        document.getElementById('model-thinking').innerHTML = '<option value="' + cfg.thinking + '">' + cfg.thinking + '</option>';
        document.getElementById('model-thinking').value = cfg.thinking;

        document.getElementById('model-deepseek').innerHTML = '<option value="' + cfg.deepseek + '">' + cfg.deepseek + '</option>';
        document.getElementById('model-deepseek').value = cfg.deepseek;
      })
      .withFailureHandler(function (e) { setModelStatus('Error loading config: ' + e.message, 'error'); })
      .getModelConfig();
  }

  function saveModelConfig() {
    var fast = document.getElementById('model-fast').value.trim();
    var thinking = document.getElementById('model-thinking').value.trim();
    var deepseek = document.getElementById('model-deepseek').value.trim();
    if (!fast || !thinking || !deepseek) {
      setModelStatus('All three model fields are required.', 'error');
      return;
    }
    setModelStatus('Saving…', 'loading');
    google.script.run
      .withSuccessHandler(function () { setModelStatus('Model configuration saved.', 'info'); })
      .withFailureHandler(function (e) { setModelStatus('Error saving: ' + e.message, 'error'); })
      .saveModelConfig(fast, thinking, deepseek);
  }

  var cachedModels = null;

  function refreshAvailableModels(force) {
    if (!force && cachedModels) {
      populateDropdowns(cachedModels);
      setModelStatus('Loaded from cache. Found ' + cachedModels.length + ' model(s).', 'info');
      return;
    }

    setModelStatus('Fetching available models…', 'loading');
    google.script.run
      .withSuccessHandler(function (models) {
        cachedModels = models;
        populateDropdowns(models);
        setModelStatus('Found ' + models.length + ' model(s).', 'info');
      })
      .withFailureHandler(function (e) { setModelStatus('Error: ' + e.message, 'error'); })
      .listAvailableModels();
  }

  function populateDropdowns(models) {
    ['model-fast', 'model-thinking', 'model-deepseek'].forEach(function (id) {
      var select = document.getElementById(id);
      var currentVal = select.value;
      select.innerHTML = '';
      models.forEach(function (m) {
        var opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        select.appendChild(opt);
      });
      if (models.includes(currentVal)) {
        select.value = currentVal;
      }
    });
  }

  // ── Multi-Tab Sweep Overlay ────────────────────────────

  /** Current agentKey selected in the sweep overlay ('eartune'|'audit'|'tether'). */
  var _sweepAgentKey = '';

  function setSweepStatus(msg, type) {
    var el = document.getElementById('sweep-status');
    el.textContent = msg;
    el.className = 'status-box' + (type ? ' ' + type : '');
  }

  /**
   * Opens the sweep overlay for the given agent.
   * Fetches all document tab names, pre-checks those in the saved merge list,
   * then renders a checkbox list for the user to confirm.
   */
  function openSweepOverlay(agentKey, agentLabel) {
    _sweepAgentKey = agentKey;
    document.getElementById('sweep-agent-badge').textContent = agentLabel + ' Annotation Sweep';
    document.getElementById('sweep-tab-list').innerHTML = '<span style="color:#9e9e9e;font-size:11px;">Loading tabs…</span>';
    setSweepStatus('', '');
    document.getElementById('sweep-confirm-btn').disabled = false;
    document.getElementById('sweep-overlay').style.display = 'flex';

    // Load all tab names AND saved merge names in parallel, then render.
    var allTabs = null;
    var mergeNames = null;

    function maybeRender() {
      if (allTabs === null || mergeNames === null) return;
      var mergeSet = new Set(mergeNames);
      var listEl = document.getElementById('sweep-tab-list');
      if (!allTabs.length) {
        listEl.innerHTML = '<span style="color:#9e9e9e;font-size:11px;">No tabs found.</span>';
        return;
      }
      listEl.innerHTML = '';
      allTabs.forEach(function (name) {
        var label = document.createElement('label');
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = name;
        cb.checked = mergeSet.has(name);
        cb.id = 'sweep-cb-' + name.replace(/\s+/g, '-');
        label.appendChild(cb);
        label.appendChild(document.createTextNode(name));
        listEl.appendChild(label);
      });
    }

    google.script.run
      .withSuccessHandler(function (tabs) { allTabs = tabs || []; maybeRender(); })
      .withFailureHandler(function (e) {
        document.getElementById('sweep-tab-list').innerHTML =
          '<span style="color:#c62828;font-size:11px;">Error loading tabs: ' + e.message + '</span>';
      })
      .getTabNames();

    google.script.run
      .withSuccessHandler(function (names) { mergeNames = names || []; maybeRender(); })
      .withFailureHandler(function () { mergeNames = []; maybeRender(); })
      .getMergeTabNames();
  }

  function closeSweepOverlay() {
    document.getElementById('sweep-overlay').style.display = 'none';
  }

  /** Collects checked tabs and kicks off the annotation sweep via google.script.run. */
  async function confirmSweep() {
    var checkboxes = document.querySelectorAll('#sweep-tab-list input[type=checkbox]:checked');
    var selected = [];
    checkboxes.forEach(function (cb) { selected.push(cb.value); });

    if (!selected.length) {
      setSweepStatus('Select at least one tab.', 'error');
      return;
    }

    var btn = document.getElementById('sweep-confirm-btn');
    btn.disabled = true;
    setSweepStatus('Sweeping ' + selected.length + ' tab(s)… See Log Sidebar for progress.', 'loading');

    try {
      var result = await runServer('annotateSelectedTabs', _sweepAgentKey, selected);
      if (result && result.ok) {
        setSweepStatus('Sweep complete — ' + selected.length + ' tab(s) annotated.', 'info');
      } else {
        var errs = (result && result.errors) ? result.errors.join('\n') : 'Unknown error';
        setSweepStatus('Sweep finished with errors:\n' + errs, 'error');
      }
    } catch (e) {
      setSweepStatus('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }
</script>
