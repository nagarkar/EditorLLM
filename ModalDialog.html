<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
      padding: 20px;
    }

    h3 {
      font-size: 14px;
      font-weight: 600;
      color: #6200ea;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #616161;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #bdbdbd;
      border-radius: 4px;
      font-size: 13px;
      color: #424242;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6200ea;
    }

    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 16px 0;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary { background: #6200ea; color: #fff; }
    .btn-primary:hover { background: #4527a0; }

    .btn-secondary { background: #ede7f6; color: #4527a0; }
    .btn-secondary:hover { background: #d1c4e9; }

    .btn-ghost { background: #f5f5f5; color: #757575; }
    .btn-ghost:hover { background: #eeeeee; }

    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    #status.info  { background: #e8f5e9; color: #2e7d32; display: block; }
    #status.error { background: #ffebee; color: #c62828; display: block; }
    #status.loading { background: #fff8e1; color: #f57f17; display: block; }
  </style>
</head>
<body>
  <h3>Agent Configuration</h3>

  <!-- API Key -->
  <div class="form-group">
    <label>Gemini API Key</label>
    <input type="password" id="api-key-input" placeholder="AIza…" autocomplete="off" />
  </div>

  <hr class="divider" />

  <!-- Agent selector -->
  <div class="form-group">
    <label>Agent</label>
    <select id="agent-select">
      <option value="architect">Structural Architect</option>
      <option value="stylist">Audio Stylist</option>
      <option value="auditor">Logical Auditor</option>
    </select>
  </div>

  <div id="status"></div>

  <div class="btn-row">
    <button class="btn-ghost" onclick="google.script.host.close()">Cancel</button>
    <button class="btn-secondary" onclick="generateExample()">Generate Example</button>
    <button class="btn-primary" onclick="saveAndGenerate()">Save & Generate</button>
  </div>

  <script>
    function setStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    function saveAndGenerate() {
      var key = document.getElementById('api-key-input').value.trim();
      var agent = document.getElementById('agent-select').value;

      if (!key) {
        setStatus('Please enter your Gemini API key.', 'error');
        return;
      }

      setStatus('Saving key and generating instructions…', 'loading');

      google.script.run
        .withSuccessHandler(function() {
          // Now trigger instruction generation for the selected agent
          var fnMap = {
            architect: google.script.run.architectGenerateInstructions,
            stylist:   google.script.run.stylistGenerateInstructions,
            auditor:   google.script.run.auditorGenerateInstructions,
          };

          google.script.run
            .withSuccessHandler(function() {
              setStatus('Instructions generated. Review the Scratch tab.', 'info');
            })
            .withFailureHandler(function(e) {
              setStatus('Error: ' + e.message, 'error');
            })
            [agent + 'GenerateInstructions']();
        })
        .withFailureHandler(function(e) {
          setStatus('Error saving key: ' + e.message, 'error');
        })
        .saveApiKey(key);
    }

    function generateExample() {
      var agent = document.getElementById('agent-select').value;
      setStatus('Generating example content…', 'loading');

      google.script.run
        .withSuccessHandler(function() {
          setStatus('Example content written to tabs.', 'info');
        })
        .withFailureHandler(function(e) {
          setStatus('Error: ' + e.message, 'error');
        })
        [agent + 'GenerateExample']();
    }

    // Pre-fill key if already set
    google.script.run
      .withSuccessHandler(function(hasKey) {
        if (hasKey) {
          document.getElementById('api-key-input').placeholder = '●●●●●●●● (already set)';
        }
      })
      .hasApiKey();
  </script>
</body>
</html>
